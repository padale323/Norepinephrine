<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Norepinephrine</title>
    <style>
        :root { --glow: #ffffff; --bg: #0a0c10; --dim: #8b949e; --blue: #58a6ff; --warn: #ffcc00; --danger: #ff4444; }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--glow);
            font-family: 'Consolas', monospace;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #output {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
            -webkit-overflow-scrolling: touch;
        }

        .input-row {
            display: flex;
            align-items: center;
            padding: 15px 25px;
            background: #000;
            border-top: 1px solid #21262d;
            position: sticky;
            bottom: 0;
        }

        #tIn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--glow);
            outline: none;
            font-family: inherit;
            font-size: 16px;
            margin-left: 10px;
            -webkit-appearance: none;
            border-radius: 0;
        }

        .prompt { color: var(--blue); font-weight: bold; }
        .cmd { color: #d2a8ff; font-weight: bold; }
        .warning-text { color: var(--warn); }
        .danger-text { color: var(--danger); font-weight: bold; }
        .dim { color: var(--dim); }
        hr { border: 0; border-top: 1px solid #21262d; margin: 10px 0; }

        #banner { line-height: 1.2; font-size: clamp(2px, 1.1vw, 13px); }

        #nore-app-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--bg);
            z-index: 9999;
            overflow: auto;
            font-family: 'Consolas', 'Courier New', monospace;
            color: var(--glow);
        }
        #nore-app-overlay.active { display: block; }
    </style>
</head>
<body>

<div id="nore-app-overlay"></div>

<div id="output"></div>
<div class="input-row" id="input-container">
    <span class="prompt">></span>
    <input id="tIn" autocomplete="off" autocorrect="off" autocapitalize="off" autofocus spellcheck="false" enterkeyhint="send">
</div>

<script>
// ==========================================
// CONFIGURATION FLAGS
// ==========================================
const BETA_AVAILABLE = true; // Set to false when no beta is available

// ==========================================
// BETA CHANNEL DETECTION
// Runs before everything else.
// Redirects between stable and beta based
// on localStorage flag and current URL.
// ==========================================
(function() {
    const STABLE_URL = "https://padale323.github.io/Norepinephrine/";
    const BETA_URL   = "https://padale323.github.io/Norepinephrine/beta/";
    const onBeta     = window.location.href.startsWith(BETA_URL);
    const onStable   = window.location.href.startsWith(STABLE_URL) && !onBeta;
    const betaFlag   = localStorage.getItem("beta_enabled");

    // If on beta with no cookie, auto-set to 1
    if (onBeta && betaFlag === null) {
        localStorage.setItem("beta_enabled", "1");
    }

    // If beta is not available, always redirect to stable from beta
    if (onBeta && !BETA_AVAILABLE) {
        window.location.replace(STABLE_URL);
        return;
    }

    // Redirect if flag and URL don't match
    if (onStable && betaFlag === "1") {
        window.location.replace(BETA_URL);
    } else if (onBeta && betaFlag === "0") {
        window.location.replace(STABLE_URL);
    }
})();

// ==========================================
// [BETA] EARLY LOAD PLUGINS
// Loads after beta detection but before
// anything else ‚ÄĒ before safe mode, TOS,
// analytics, terminal init, and regular plugins.
// ==========================================
(async () => {
    const earlyUrls = JSON.parse(localStorage.getItem("early_plugins") || "[]");
    for (const url of earlyUrls) {
        try {
            const r = await fetch(url + "?t=" + Date.now());
            if (!r.ok) throw new Error(`Server returned ${r.status}`);
            const code = await r.text();
            new Function(code)();
        } catch (e) {
            // Store error to print after terminal boots
            const errs = JSON.parse(sessionStorage.getItem("early_plugin_errors") || "[]");
            errs.push({ url, msg: e.message });
            sessionStorage.setItem("early_plugin_errors", JSON.stringify(errs));
        }
    }
})();

// ==========================================
// SAFE MODE DETECTION
// ==========================================
const _hasPlugins = JSON.parse(localStorage.getItem("plugins") || "[]").length > 0;
let _safeMode = new URLSearchParams(window.location.search).has("safe");
let _safeModeKeyCount = 0;
let _safeModeKeyWindow = null;

if (_hasPlugins && !_safeMode) {
    const _safeModeKeyHandler = function(e) {
        if (e.key === "s" || e.key === "S") {
            e.preventDefault();
            _safeModeKeyCount++;
            clearTimeout(_safeModeKeyWindow);
            _safeModeKeyWindow = setTimeout(function() { _safeModeKeyCount = 0; }, 1000);
            if (_safeModeKeyCount >= 5) {
                _safeMode = true;
                document.removeEventListener("keydown", _safeModeKeyHandler, true);
            }
        }
    };
    // Use capture phase (true) so we intercept before the input element gets it
    document.addEventListener("keydown", _safeModeKeyHandler, true);
    setTimeout(function() { document.removeEventListener("keydown", _safeModeKeyHandler, true); }, 5000);
}

// ==========================================
// MAIN TERMINAL LOGIC
// ==========================================
const out = document.getElementById("output");
const tin = document.getElementById("tIn");
let history = [];
let historyIndex = -1;

const ASCII_ART = `
‚Ėą‚Ėą‚Ėą‚ēó   ‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚Ėą‚ēó   ‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚ēó  ‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚Ėą‚ēó   ‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó
‚Ėą‚Ėą‚Ėą‚Ėą‚ēó  ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚ēź‚ēĚ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚Ėą‚ēó  ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚ēź‚ēĚ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĎ  ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚Ėą‚ēó  ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚ēź‚ēĚ
‚Ėą‚Ėą‚ēĒ‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó  ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó  ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó  
‚Ėą‚Ėą‚ēĎ‚ēö‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēĚ  ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚ēĚ ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ‚ēö‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēĚ  ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚ēĚ ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ‚ēö‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēĚ  
‚Ėą‚Ėą‚ēĎ ‚ēö‚Ėą‚Ėą‚Ėą‚Ėą‚ēĎ‚ēö‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚ēĎ  ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĎ     ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ ‚ēö‚Ėą‚Ėą‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĎ     ‚Ėą‚Ėą‚ēĎ  ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ  ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ ‚ēö‚Ėą‚Ėą‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó
‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēź‚ēź‚ēĚ ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ ‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēĚ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ‚ēö‚ēź‚ēĚ     ‚ēö‚ēź‚ēĚ‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēź‚ēź‚ēĚ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ‚ēö‚ēź‚ēĚ     ‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēĚ‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēĚ‚ēö‚ēź‚ēĚ‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēź‚ēź‚ēĚ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ
`;

const VERSION_STRING = "v1.1 Build idk";

let tosVersionRemote = null;
let tosContent = "";
let tosAcceptedVersion = null;

// Confirmation state
let _awaitingConfirm = false;
let _confirmCallback = null;

// Plugin Storage Architecture
window.customCommands = {};
window.customHelp = {};

window.registerCommand = function(cmdName, description, handlerFunction) {
    window.customCommands[cmdName.toLowerCase()] = handlerFunction;
    window.customHelp[cmdName.toLowerCase()] = description;
};

function setStorage(name, value) {
    try { localStorage.setItem(name, value); } catch(e) {}
}

function getStorage(name) {
    try { return localStorage.getItem(name); } catch(e) { return null; }
}

const print = (t, html = false) => {
    const div = document.createElement("div");
    if (t === undefined) return;
    const textContent = typeof t === 'object' ? JSON.stringify(t, null, 2) : String(t);
    html ? div.innerHTML = textContent : div.textContent = textContent;
    out.appendChild(div);
    out.scrollTop = out.scrollHeight;
};

// Live-updating users online line
let _usersOnlineDiv = null;
function printUsersOnline(count) {
    if (!_usersOnlineDiv) {
        _usersOnlineDiv = document.createElement("div");
        out.appendChild(_usersOnlineDiv);
    }
    _usersOnlineDiv.innerHTML = `<span class="dim">${count} user${count === 1 ? "" : "s"} online</span>`;
    out.scrollTop = out.scrollHeight;
}

// Print the banner ‚ÄĒ ASCII art scales with viewport, version string stays normal size
function printBanner() {
    const art = document.createElement("div");
    art.id = "banner";
    art.textContent = ASCII_ART;
    out.appendChild(art);

    const ver = document.createElement("div");
    ver.textContent = VERSION_STRING;
    out.appendChild(ver);

    out.scrollTop = out.scrollHeight;
}

async function loadTOS() {
    try {
        const r = await fetch("https://raw.githubusercontent.com/Norepinephrine-Tools/Terms/refs/heads/main/TOS.txt");
        if (!r.ok) throw new Error("Network response failed");
        const text = await r.text();
        const lines = text.split("\n");
        const first = lines[0].trim();
        const match = first.match(/tosver\s*=\s*(\d+)/i);
        if (match) {
            tosVersionRemote = match[1];
            tosContent = lines.slice(1).join("\n");
        } else {
            tosVersionRemote = "1";
            tosContent = text;
        }
    } catch {
        tosVersionRemote = "1";
        tosContent = "Fallback TOS Loaded.\n1. Do not use this tool for malicious purposes.\n2. Standard terms apply.";
    }
    tosAcceptedVersion = getStorage("tosver");
}

function tosValid() {
    return tosAcceptedVersion && tosVersionRemote && tosAcceptedVersion === tosVersionRemote;
}

const STABLE_URL = "https://padale323.github.io/Norepinephrine/";
const BETA_URL   = "https://padale323.github.io/Norepinephrine/beta/";
const _onBeta    = window.location.href.startsWith(BETA_URL);

const commands = {
    "installer": "Launch the visual plugin installer.",
    "plugin": "Manage plugins (add <url> | list | remove <index>).",
    "safemode": "Reboot into safe mode (plugins skipped).",
    "version": "Show current version info.",
    "changelog": "Show recent updates.",
    "tos": "Display Terms of Service.",
    "accept": "Accept current Terms of Service.",
    "stats": "View current users.",
    "reboot": "Reloads Norepinephrine.",
    "reinstall": "Wipe all local data and reload fresh.",
    "clear": "Clear screen.",
    "help": "Show this menu."
};

// Show the right channel command based on current URL and beta availability
if (_onBeta) {
    commands["disablebetafeatures"] = "Switch back to the stable channel.";
} else if (BETA_AVAILABLE) {
    commands["enablebetafeatures"] = "Switch to the beta channel.";
}

async function handle(input) {
    const raw = input.trim();
    if (!raw) return;

    // Confirmation prompt handler
    if (_awaitingConfirm) {
        print('\n> ' + raw);
        const choice = raw.toLowerCase();
        if (choice === 'y') {
            const cb = _confirmCallback;
            _awaitingConfirm = false;
            _confirmCallback = null;
            await cb('y');
        } else if (choice === 'd') {
            const cb = _confirmCallback;
            _awaitingConfirm = false;
            _confirmCallback = null;
            await cb('d');
        } else {
            print("Cancelled.");
            _awaitingConfirm = false;
            _confirmCallback = null;
        }
        return;
    }

    print(`\n> ${raw}`);
    history.push(raw);
    historyIndex = history.length;

    const parts = raw.split(" ");
    const cmd = parts[0].toLowerCase();
    const subCmd = parts[1] ? parts[1].toLowerCase() : "";
    const args = parts.slice(2).join(" ");

    // BULLETPROOF TOS GUARD
    if (!tosValid() && cmd !== "tos" && cmd !== "accept") {
        if (!tosAcceptedVersion) {
            return print("You must accept the Terms of Service. Type 'tos' to read, then 'accept'.");
        }
        if (tosAcceptedVersion !== tosVersionRemote) {
            return print("TOS updated. You must reaccept. Type 'tos' to read, then 'accept'.");
        }
    }

    const isBuiltIn = commands.hasOwnProperty(cmd) || cmd === "installer" || cmd === "plugin";
    const isCustom = window.customCommands.hasOwnProperty(cmd);

    // Handle Custom Installed Commands
    if (isCustom && !isBuiltIn) {
        try {
            await window.customCommands[cmd](parts.slice(1).join(" "));
        } catch (e) {
            print(`Plugin Command Error: ${e.message}`);
        }
        return;
    }

    switch(cmd) {
        case 'installer':
            print("Preparing visual installer... Rebooting terminal.");
            setStorage("run_installer", "true");
            setTimeout(() => window.location.reload(), 1000);
            break;

        case 'plugin':
            let pluginUrls = JSON.parse(getStorage("plugins") || "[]");

            if (subCmd === "add" && args) {
                if (pluginUrls.includes(args)) {
                    print("Plugin already installed.");
                } else {
                    let requires = [];
                    let permissions = [];
                    let requestEarlyload = false;
                    let requireEarlyload = false;
                    try {
                        const preCheck = await fetch(args + "?t=" + Date.now());
                        if (preCheck.ok) {
                            const preCode = await preCheck.text();

                            // Parse @requires
                            requires = [...preCode.matchAll(/^\/\/\s*@requires\s+(.+)$/gm)]
                                .map(m => m[1].trim())
                                .filter(Boolean);

                            // Detect early load declarations
                            requireEarlyload = /^\/\/\s*@require-earlyload\s*$/m.test(preCode);
                            requestEarlyload = !requireEarlyload && /^\/\/\s*@request-earlyload\s*$/m.test(preCode);

                            // Static analysis ‚ÄĒ detect what the plugin actually uses
                            const checks = [
                                { key: "network",     label: "Makes network requests (fetch)",              pattern: /fetch\(/,                       risk: true },
                                { key: "storage",     label: "Reads/writes localStorage",                   pattern: /localStorage/,                  risk: true },
                                { key: "handle-wrap", label: "Intercepts all terminal input (handle wrap)", pattern: /window\.handle|handle\s*=/,      risk: true },
                                { key: "dom",         label: "Directly manipulates the page DOM",           pattern: /document\./,                    risk: true },
                                { key: "eval",        label: "Executes dynamic code (eval/new Function)",   pattern: /\beval\(|new Function\(/,        risk: true },
                            ];
                            permissions = checks.filter(c => c.pattern.test(preCode));
                        }
                    } catch { }

                    print("<hr>", true);
                    print(`<span class="warning-text">!! PLUGIN SECURITY WARNING !!</span>`, true);
                    print(`Plugins run arbitrary code on your terminal.`);
                    print(`Only install plugins from sources you trust.`);
                    print(`<span class="dim">URL: ${args}</span>`, true);

                    if (requireEarlyload) {
                        print('<span class="danger-text">‚ö† [BETA] This plugin requires early load ‚ÄĒ it will run before everything on boot.</span>', true);
                    } else if (requestEarlyload) {
                        print('<span class="warning-text">‚ö† [BETA] This plugin requests early load ‚ÄĒ it prefers to run before other plugins but does not require it.</span>', true);
                        print('<span class="dim">  y = install with early load  |  n = cancel  |  d = install without early load</span>', true);
                    }

                    if (permissions.length > 0) {
                        print('\nDetected capabilities:', true);
                        permissions.forEach(p => {
                            print('<span class="danger-text">  ‚ö† ' + p.label + '</span>', true);
                        });
                    } else {
                        print('<span class="dim">No elevated capabilities detected.</span>', true);
                    }

                    if (requires.length > 0) {
                        print('\nRequired dependencies:', true);
                        requires.forEach(dep => print('<span class="dim">  - ' + dep + '</span>', true));
                        print('Dependencies will be loaded automatically.');
                    }

                    print(requestEarlyload ? '\nAdd this plugin? (y/n/d)' : '\nAdd this plugin? (y/n)');
                    print("<hr>", true);

                    // Store context for the confirm handler
                    const _installUrl = args;
                    const _isRequestEarly = requestEarlyload;
                    const _isRequireEarly = requireEarlyload;

                    _awaitingConfirm = true;
                    _confirmCallback = async (choice) => {
                        if (_isRequireEarly) {
                            // Must go to early load
                            const earlyUrls = JSON.parse(getStorage("early_plugins") || "[]");
                            if (!earlyUrls.includes(_installUrl)) {
                                earlyUrls.push(_installUrl);
                                setStorage("early_plugins", JSON.stringify(earlyUrls));
                            }
                            print('Added to early load plugins: ' + _installUrl + '. Restart terminal to apply.');
                        } else if (_isRequestEarly && choice === 'd') {
                            // User chose to deny early load ‚ÄĒ install as regular plugin
                            pluginUrls.push(_installUrl);
                            setStorage("plugins", JSON.stringify(pluginUrls));
                            print('Added plugin (without early load): ' + _installUrl + '. Restart terminal to apply.');
                        } else if (_isRequestEarly) {
                            // User accepted early load
                            const earlyUrls = JSON.parse(getStorage("early_plugins") || "[]");
                            if (!earlyUrls.includes(_installUrl)) {
                                earlyUrls.push(_installUrl);
                                setStorage("early_plugins", JSON.stringify(earlyUrls));
                            }
                            print('Added to early load plugins: ' + _installUrl + '. Restart terminal to apply.');
                        } else {
                            // Normal plugin
                            pluginUrls.push(_installUrl);
                            setStorage("plugins", JSON.stringify(pluginUrls));
                            print('Added plugin: ' + _installUrl + '. Restart terminal to apply.');
                        }
                    };
                }
            } else if (subCmd === "list") {
                print("<hr>", true);
                print("Installed Plugins:");
                const earlyUrls2 = JSON.parse(getStorage("early_plugins") || "[]");
                const allUrls = [
                    ...pluginUrls.map(u => ({ url: u, early: false })),
                    ...earlyUrls2.map(u => ({ url: u, early: true }))
                ];
                if (allUrls.length === 0) print(" - None installed.");
                allUrls.forEach((p, i) => print(` [${i}] ${p.url}${p.early ? ' <span class="warning-text">[early]</span>' : ''}`, true));
                print("<hr>", true);
            } else if (subCmd === "remove" && args !== "") {
                const earlyUrlsR = JSON.parse(getStorage("early_plugins") || "[]");
                const allR = [
                    ...pluginUrls.map(u => ({ url: u, early: false })),
                    ...earlyUrlsR.map(u => ({ url: u, early: true }))
                ];
                let idx = parseInt(args);
                if (!isNaN(idx) && idx >= 0 && idx < allR.length) {
                    const target = allR[idx];
                    if (target.early) {
                        const newEarly = earlyUrlsR.filter(u => u !== target.url);
                        setStorage("early_plugins", JSON.stringify(newEarly));
                    } else {
                        const newPlugins = pluginUrls.filter(u => u !== target.url);
                        setStorage("plugins", JSON.stringify(newPlugins));
                    }
                    print(`Removed plugin: ${target.url}. Restart terminal to apply.`);
                } else {
                    print("Invalid index. Use 'plugin list' to find the index.");
                }
            } else if (subCmd === "remove") {
                print("Usage: plugin remove <index>");
            } else {
                print("Usage: plugin add <url> | plugin list | plugin remove <index>");
            }
            break;

        case 'safemode':
            print("Rebooting into safe mode...");
            setTimeout(() => {
                const url = new URL(window.location.href);
                url.searchParams.set("safe", "");
                window.location.href = url.toString();
            }, 500);
            break;

        case 'reboot':
            print("Rebooting...");
            setTimeout(() => window.location.reload(), 500);
            break;

        case 'version':
            print("<hr>", true);
            printBanner();
            print("Status: Stable");
            print("<hr>", true);
            break;

        case 'changelog':
            print("<hr>", true);
            print("v1.1 ‚ÄĒ What's New:");
            print(" - NoreAPI: plugins can launch full-page apps via NoreAPI.launchApp().");
            print(" - NoreAPI: builder function pattern ‚ÄĒ no HTML strings or scope issues.");
            print(" - Plugin install runs static analysis and shows detected capabilities.");
            print(" - Plugin dependencies via // @requires at top of plugin file.");
            print(" - Early load plugins run before everything else on boot.");
            print(" - Plugin list shows early load plugins tagged with [early].");
            print(" - Beta channel support via enablebetafeatures / disablebetafeatures.");
            print(" - Safe Mode via ?safe URL, spam S on boot, or safemode command.");
            print(" - Plugin add security warning and confirmation prompt.");
            print(" - Mobile improvements: dvh layout, iOS zoom fix, responsive ASCII banner.");
            print(" - Users online shown live under banner.");
            print(" - Analytics with 10 second timeout.");
            print("<hr>", true);
            break;

        case 'tos':
            print("<hr>", true);
            print(tosContent);
            print("<hr>", true);
            break;

        case 'accept':
            if (!tosVersionRemote) return print("Error: TOS not fully loaded yet.");
            setStorage("tosver", tosVersionRemote);
            tosAcceptedVersion = tosVersionRemote;
            print("TOS accepted. You may now use the terminal.");
            break;

        case 'stats':
            if (window.currentStats) {
                print("<hr>", true);
                print(`Live Connections: <span class="cmd">${window.currentStats.active}</span>`, true);
                print(`Terminal ID:      <span class="dim">${hwid}</span>`, true);
                print("<hr>", true);
            } else {
                print("Syncing with network... try again in a moment.");
            }
            break;

        case 'reinstall':
            print("Clearing all local data...");
            localStorage.clear();
            print("Done. Rebooting...");
            setTimeout(() => window.location.reload(), 800);
            break;

        case 'enablebetafeatures':
            if (!BETA_AVAILABLE) {
                print("There is no beta available at this time.");
            } else if (_onBeta) {
                print("Already running on the beta channel.");
            } else {
                print("Switching to beta channel...");
                localStorage.setItem("beta_enabled", "1");
                setTimeout(function() { window.location.replace(BETA_URL); }, 800);
            }
            break;

        case 'disablebetafeatures':
            if (!_onBeta) {
                print("Already running on the stable channel.");
            } else {
                print("Switching to stable channel...");
                localStorage.setItem("beta_enabled", "0");
                setTimeout(function() { window.location.replace(STABLE_URL); }, 800);
            }
            break;

        case 'help':
            print("<hr>", true);
            if (_safeMode) print(`<span class="warning-text">[SAFE MODE] Plugins were not loaded.</span>`, true);
            print("--- Built-in Commands ---");
            for (let c in commands) print(`<span class="cmd">${c}</span>: ${commands[c]}`, true);
            if (Object.keys(window.customHelp).length > 0) {
                print("\n--- Plugin Commands ---");
                for (let c in window.customHelp) print(`<span class="cmd">${c}</span>: ${window.customHelp[c]}`, true);
            }
            print("<hr>", true);
            break;

        case 'clear':
            out.innerHTML = "";
            _usersOnlineDiv = null;
            break;

        default:
            print(`Unknown command: '${cmd}'. Type 'help'.`);
    }
}

tin.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
        handle(tin.value);
        tin.value = "";
    } else if (e.key === "ArrowUp") {
        if (historyIndex > 0) {
            historyIndex--;
            tin.value = history[historyIndex];
        }
        e.preventDefault();
    } else if (e.key === "ArrowDown") {
        if (historyIndex < history.length - 1) {
            historyIndex++;
            tin.value = history[historyIndex];
        } else {
            historyIndex = history.length;
            tin.value = "";
        }
        e.preventDefault();
    }
});

// Scroll output to bottom when keyboard opens on mobile
tin.addEventListener("focus", () => {
    setTimeout(() => out.scrollTop = out.scrollHeight, 300);
});

document.addEventListener("click", () => {
    if (document.activeElement !== tin) tin.focus();
});

// ==========================================
// FETCH + EVAL PLUGIN LOADER
// ==========================================
window._loadedPlugins = new Set();

async function loadPluginFromUrl(url) {
    if (window._loadedPlugins.has(url)) return;
    try {
        const r = await fetch(url + "?t=" + Date.now());
        if (!r.ok) throw new Error(`Server returned ${r.status}`);
        const code = await r.text();

        const requires = [...code.matchAll(/^\/\/\s*@requires\s+(.+)$/gm)]
            .map(m => m[1].trim())
            .filter(Boolean);

        for (const depUrl of requires) {
            if (!window._loadedPlugins.has(depUrl)) {
                print(`<span class="dim">[Dependency] Loading: ${depUrl}</span>`, true);
                await loadPluginFromUrl(depUrl);
            }
        }

        window._loadedPlugins.add(url);
        new Function(code)();
        print(`[Plugin Loaded]: ${url}`);
    } catch (err) {
        print(`<span class="danger-text">[Plugin Error] ${url}: ${err.message}</span>`, true);
    }
}

async function loadPlugins() {
    const pluginUrls = JSON.parse(getStorage("plugins") || "[]");
    for (const url of pluginUrls) {
        await loadPluginFromUrl(url);
    }
}

// ==========================================
// NORE APP API
// Allows plugins to launch full-page apps
// and return cleanly to the terminal.
// ==========================================
const _appOverlay = document.getElementById("nore-app-overlay");
let _appActive = false;

window.NoreAPI = {
    version: "1.0",
    print,
    getStorage,
    setStorage,

    // Launch a full-page app.
    // builder: function that receives a container div and builds the UI into it.
    //          All DOM manipulation happens after the container is in the page,
    //          so getElementById and event listeners work immediately.
    // Returns true if launched, false if an app is already running.
    launchApp(builder) {
        if (_appActive) {
            print('<span class="danger-text">[NoreAPI] An app is already running. Call NoreAPI.exitApp() first.</span>', true);
            return false;
        }
        if (typeof builder !== "function") {
            print('<span class="danger-text">[NoreAPI] launchApp requires a function. See the plugin dev guide.</span>', true);
            return false;
        }
        _appActive = true;
        _appOverlay.innerHTML = "";
        const container = document.createElement("div");
        container.style.cssText = "width:100%;min-height:100%;box-sizing:border-box;";
        _appOverlay.appendChild(container);
        _appOverlay.classList.add("active");
        // Disable input so user can't type to terminal while app is open
        tin.disabled = true;
        tin.blur();
        try {
            builder(container);
        } catch(e) {
            print('<span class="danger-text">[NoreAPI] App error: ' + e.message + '</span>', true);
            this.exitApp();
            return false;
        }
        return true;
    },

    exitApp() {
        if (!_appActive) return;
        _appActive = false;
        _appOverlay.classList.remove("active");
        _appOverlay.innerHTML = "";
        tin.disabled = false;
        tin.focus();
        print('<span class="dim">[App exited]</span>', true);
    },

    // Check if an app is currently running
    isAppActive() {
        return _appActive;
    }
};

// ==========================================
// ANALYTICS & HWID ENGINE
// ==========================================
const GAS_URL = "https://script.google.com/macros/s/AKfycbyTb30dK2Olw4fvCb5yD4YwoVTuHpKyBfzzJ83GsZ_9hTWvwRPqTC3iIb--JMTV0tJxHA/exec";

let hwid = getStorage("terminal_hwid");
let isNewVisitor = false;

if (!hwid) {
    hwid = 'ID-' + Math.random().toString(36).substr(2, 9) + '-' + Date.now();
    setStorage("terminal_hwid", hwid);
    isNewVisitor = true;
}

async function syncAnalytics() {
    try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 10000);
        const response = await fetch(`${GAS_URL}?hwid=${hwid}`, { signal: controller.signal });
        clearTimeout(timeout);
        const data = await response.json();
        window.currentStats = data;
        if (typeof data.active === "number") printUsersOnline(data.active);
        return data;
    } catch (e) {
        printUsersOnline("?");
        return null;
    }
}

setInterval(syncAnalytics, 60000);

// ==========================================
// BOOT SEQUENCE
// ==========================================
async function _bootTerminal() {
    await loadTOS();
    printBanner();

    if (_safeMode) {
        print("<span class='warning-text'>[ SAFE MODE ‚ÄĒ Plugins will not be loaded ]</span>", true);
        print("<span class='dim'>Use 'loadplugins' to load them anyway, or 'plugin list' to manage.</span>", true);
        print("<hr>", true);
    }

    printUsersOnline("...");
    print("<hr>", true);
    syncAnalytics();

    if (_safeMode) {
        window.customCommands["loadplugins"] = async function () {
            print("Loading plugins...");
            await loadPlugins();
            delete window.customCommands["loadplugins"];
            print("Done. All plugins loaded.");
        };
    } else {
        await loadPlugins();
    }

    if (!tosAcceptedVersion)
        print("You must accept the Terms of Service. Type 'tos' to view.");
    else if (tosAcceptedVersion !== tosVersionRemote)
        print("TOS updated. Type 'tos' to review and 'accept' to continue.");
    else
        print("Type 'help' for available operations.");

    // Print any early load plugin errors that were stored before boot
    const earlyErrors = JSON.parse(sessionStorage.getItem("early_plugin_errors") || "[]");
    if (earlyErrors.length > 0) {
        earlyErrors.forEach(e => {
            print(`<span class="danger-text">[Early Plugin Error] ${e.url}: ${e.msg}</span>`, true);
        });
        sessionStorage.removeItem("early_plugin_errors");
    }
}

// ==========================================
// BOOT INTERCEPTOR FOR INSTALLER
// ==========================================
const _installerPending = localStorage.getItem("run_installer") === "true";

if (_installerPending) {
    localStorage.removeItem("run_installer");
    fetch("https://raw.githubusercontent.com/padale323/Norepinephrine-Installer/refs/heads/main/Installer.js?t=" + Date.now())
        .then(r => {
            if (!r.ok) throw new Error(`Server returned ${r.status}`);
            return r.text();
        })
        .then(code => {
            new Function(code)();
        })
        .catch(err => {
            _bootTerminal().then(() => {
                print(`<span class="danger-text">[Installer Error] Failed to load installer: ${err.message}</span>`, true);
                print(`<span class="warning-text">Continuing in normal terminal mode.</span>`, true);
            });
        });
} else {
    _bootTerminal();
}
