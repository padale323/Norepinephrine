<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NoreOS Terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #0F1115;
            --text: #E2E8F0;
            --primary: #818CF8;
            --success: #34D399;
            --error: #f87171;
            --dim: #64748B;
            --warn: #fbbf24;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100dvh;
        }

        #terminal-container {
            height: 100%;
            width: 100%;
            max-width: 1024px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            overflow-y: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }

        @media (min-width: 768px) {
            #terminal-container {
                padding: 40px;
            }
        }

        #terminal-container::-webkit-scrollbar {
            display: none;
        }

        .line {
            line-height: 1.6;
            margin-bottom: 8px;
            word-break: break-word;
            opacity: 0;
            transform: translateY(5px);
            animation: fadeIn 0.2s forwards;
            white-space: pre-wrap;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .type-system { color: var(--dim); font-style: italic; }
        .type-success { color: var(--success); }
        .type-error { color: var(--error); }
        .type-input { color: var(--primary); font-weight: 600; }
        .type-warning { color: var(--warn); }

        .logo-text {
            font-size: clamp(2.5rem, 8vw, 6rem);
            font-weight: 800;
            letter-spacing: -0.05em;
            color: white;
            line-height: 0.9;
            margin: 1.5rem 0;
            text-transform: uppercase;
        }

        .prompt-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 4px;
        }

        .prompt-label {
            color: var(--primary);
            font-weight: 700;
            white-space: nowrap;
            user-select: none;
        }

        #tIn {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-family: inherit;
            font-size: 16px;
            padding: 0;
            caret-color: var(--primary);
        }

        #app-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            z-index: 9999;
            overflow: auto;
        }

        #app-overlay.active {
            display: block;
        }

        hr { border: 0; border-top: 1px solid rgba(255,255,255,0.05); margin: 15px 0; }
        
        .dim { color: var(--dim); }
        .cmd { color: var(--primary); font-weight: 600; }
        .danger-text { color: var(--error); font-weight: bold; }
        .warning-text { color: var(--warn); }
    </style>
</head>
<body>

<div id="terminal-container">
    <div id="output"></div>
    <div class="prompt-row" id="input-area">
        <span class="prompt-label">nore@terminal:~$</span>
        <input id="tIn" spellcheck="false" autocomplete="off" autofocus enterkeyhint="send">
    </div>
    <div style="height: 100px;"></div>
</div>

<div id="app-overlay"></div>

<script>
    // ==========================================
    // BETA CHANNEL DETECTION
    // ==========================================
    const BETA_AVAILABLE = true;
    (function(){
        const S = window.location.origin + window.location.pathname;
        const f = localStorage.getItem('beta_enabled');
        const onBeta = new URLSearchParams(window.location.search).has('beta');
        
        if (onBeta && f === null) localStorage.setItem('beta_enabled', '1');
        if (onBeta && !BETA_AVAILABLE) {
            const u = new URL(window.location.href); u.searchParams.delete('beta'); location.replace(u.toString());
        }
    })();

    // ==========================================
    // CORE STATE & CONFIG
    // ==========================================
    const VERSION = '1.1';
    const out = document.getElementById('output');
    const tin = document.getElementById('tIn');
    const container = document.getElementById('terminal-container');
    const overlay = document.getElementById('app-overlay');
    
    let history = JSON.parse(localStorage.getItem('nore_history') || '[]');
    let histIdx = history.length;
    let awaitingConfirm = null;
    let tosVersionRemote = '104';
    let tosContent = '';
    
    window.customCommands = {};
    window.customHelp = {};
    window.currentStats = null;

    // ==========================================
    // UTILITIES
    // ==========================================
    const print = (content, html = false) => {
        const div = document.createElement('div');
        div.className = `line`;
        if (html) div.innerHTML = content;
        else div.textContent = content;
        out.appendChild(div);
        container.scrollTop = container.scrollHeight;
    };

    const getStorage = (k) => localStorage.getItem(k);
    const setStorage = (k, v) => localStorage.setItem(k, v);

    const getHWID = () => {
        let id = localStorage.getItem('terminal_hwid');
        if (!id) {
            id = 'ID-' + Math.random().toString(36).substr(2, 9) + '-' + Date.now();
            localStorage.setItem('terminal_hwid', id);
        }
        return id;
    };

    const hwid = getHWID();

    function printUsersOnline(count) {
        let div = document.getElementById('users-online-stat');
        if (!div) {
            div = document.createElement('div');
            div.id = 'users-online-stat';
            out.appendChild(div);
        }
        div.innerHTML = `<span class="dim">${count} user${count === 1 ? '' : 's'} online</span>`;
        container.scrollTop = container.scrollHeight;
    }

    // ==========================================
    // PLUGIN SYSTEM
    // ==========================================
    window._loadedPlugins = new Set();
    const loadPlugin = async (url) => {
        if (window._loadedPlugins.has(url)) return;
        try {
            const r = await fetch(url + '?t=' + Date.now());
            if (!r.ok) throw new Error('Server returned ' + r.status);
            const code = await r.text();
            
            // Handle dependencies
            const deps = [...code.matchAll(/\/\/ @requires\s+(.*)/g)].map(m => m[1].trim());
            for (const d of deps) await loadPlugin(d);

            new Function(code)();
            window._loadedPlugins.add(url);
            print(`[Plugin Loaded]: ${url.split('/').pop()}`, 'success');
        } catch (e) {
            print(`<span class="danger-text">[Plugin Error] ${url}: ${e.message}</span>`, true);
        }
    };

    // ==========================================
    // NOREAPI
    // ==========================================
    const readyCallbacks = [];
    let readyFired = false;

    window.NoreAPI = {
        version: VERSION,
        print, getStorage, setStorage,
        onReady: (fn) => {
            if (readyFired) fn();
            else readyCallbacks.push(fn);
        },
        launchApp: (builder) => {
            if (overlay.classList.contains('active')) return false;
            overlay.innerHTML = '';
            overlay.classList.add('active');
            const c = document.createElement('div');
            c.style.cssText = 'width:100%;min-height:100%;box-sizing:border-box;';
            overlay.appendChild(c);
            tin.disabled = true; tin.blur();
            try { builder(c); return true; }
            catch (e) { print(`<span class="danger-text">[NoreAPI] App error: ${e.message}</span>`, true); window.NoreAPI.exitApp(); return false; }
        },
        exitApp: () => {
            overlay.classList.remove('active');
            overlay.innerHTML = '';
            tin.disabled = false; tin.focus();
            print('<span class="dim">[App exited]</span>', true);
        },
        isAppActive: () => overlay.classList.contains('active'),
        getScreen: () => Array.from(out.children).map(el => ({ text: el.textContent, html: el.innerHTML, element: el })),
        getScreenText: () => out.innerText,
        getScreenHTML: () => out.innerHTML,
        watchScreen: (cb) => {
            const obs = new MutationObserver(m => m.forEach(mu => mu.addedNodes.forEach(n => { if(n.nodeType === 1) cb({ text: n.textContent, html: n.innerHTML, element: n }); })));
            obs.observe(out, { childList: true });
            return () => obs.disconnect();
        },
        clearScreen: () => { out.innerHTML = ''; },
        scrollToBottom: () => { container.scrollTop = container.scrollHeight; },
        scrollToTop: () => { container.scrollTop = 0; },
        lineCount: () => out.children.length,
        removeLastLines: (n = 1) => { for(let i=0; i<n; i++) out.lastChild && out.removeChild(out.lastChild); },
        replaceLastLine: (t, html) => {
            const l = out.lastChild; if (!l) return;
            html ? l.innerHTML = t : l.textContent = t;
        }
    };

    window.registerCommand = (n, d, fn) => {
        window.customCommands[n.toLowerCase()] = fn;
        window.customHelp[n.toLowerCase()] = d;
    };

    // ==========================================
    // COMMANDS HANDLER
    // ==========================================
    const commands = {
        'installer': 'Launch the visual plugin installer.',
        'plugin': 'Manage plugins (add|list|remove|move).',
        'safemode': 'Reboot into safe mode (plugins skipped).',
        'version': 'Show current version info.',
        'changelog': 'Show recent updates.',
        'tos': 'Display Terms of Service.',
        'accept': 'Accept current Terms of Service.',
        'stats': 'View current users.',
        'enablebetafeatures': 'Switch to the beta channel.',
        'disablebetafeatures': 'Switch back to the stable channel.',
        'reboot': 'Reloads NoreOS.',
        'reinstall': 'Wipe all local data and reload fresh.',
        'clear': 'Clear screen.',
        'help': 'Show this menu.'
    };

    const handle = async (val) => {
        const input = val.trim();
        if (!input) return;

        if (awaitingConfirm) {
            print('\n/ ' + input);
            const c = input.toLowerCase();
            const cb = awaitingConfirm;
            awaitingConfirm = null;
            await cb(c);
            return;
        }

        print('\n/ ' + input);
        history.push(input);
        localStorage.setItem('nore_history', JSON.stringify(history.slice(-50)));
        histIdx = history.length;

        const parts = input.split(' ');
        const cmd = parts[0].toLowerCase();
        const sub = parts[1] ? parts[1].toLowerCase() : '';
        const args = parts.slice(2).join(' ');

        const tosAccepted = localStorage.getItem('tosver') === tosVersionRemote;
        if (!tosAccepted && !['tos', 'accept'].includes(cmd)) {
            return print("You must accept the Terms of Service. Type 'tos' then 'accept'.");
        }

        if (window.customCommands[cmd]) {
            try { await window.customCommands[cmd](parts.slice(1).join(' ')); return; }
            catch(e) { print('Plugin Error: ' + e.message, 'error'); return; }
        }

        switch (cmd) {
            case 'help':
                print('<hr>', true);
                print('--- Built-in Commands ---');
                for (const c in commands) print(`<span class="cmd">${c}</span>: ${commands[c]}`, true);
                if (Object.keys(window.customHelp).length) {
                    print('\n--- Plugin Commands ---');
                    for (const c in window.customHelp) print(`<span class="cmd">${c}</span>: ${window.customHelp[c]}`, true);
                }
                print('<hr>', true);
                break;
            case 'clear': out.innerHTML = ''; break;
            case 'stats':
                if (window.currentStats) {
                    print('<hr>', true);
                    print(`Live Connections: <span class="cmd">${window.currentStats.active}</span>`, true);
                    print(`Terminal ID:      <span class="dim">${hwid}</span>`, true);
                    print('<hr>', true);
                } else print('Syncing with network...');
                break;
            case 'tos': print('<hr>', true); print(tosContent || 'Loading...'); print('<hr>', true); break;
            case 'accept':
                localStorage.setItem('tosver', tosVersionRemote);
                print('TOS accepted.', 'success');
                break;
            case 'plugin':
                const plugins = JSON.parse(localStorage.getItem('plugins') || '[]');
                const earlyPlugins = JSON.parse(localStorage.getItem('early_plugins') || '[]');
                const all = [...plugins.map(u => ({url:u, early:false})), ...earlyPlugins.map(u => ({url:u, early:true}))];

                if (sub === 'add' && parts[2]) {
                    const url = parts[2];
                    if (plugins.includes(url) || earlyPlugins.includes(url)) return print('Already installed.');
                    
                    print('Fetching security manifest...', 'system');
                    try {
                        const r = await fetch(url + '?t=' + Date.now());
                        const code = await r.text();
                        const requires = [...code.matchAll(/\/\/ @requires\s+(.*)/g)].map(m => m[1].trim());
                        const reqEarly = code.includes('// @require-earlyload');
                        const optEarly = code.includes('// @request-earlyload');
                        const checks = [
                            {label:'Network requests', pattern:/fetch\(/},
                            {label:'localStorage', pattern:/localStorage/},
                            {label:'DOM manipulation', pattern:/document\./},
                            {label:'Dynamic code execution', pattern:/\beval\(|new Function\(/},
                        ];
                        const found = checks.filter(c => c.pattern.test(code));

                        print('<hr>', true);
                        print('<span class="warning-text">!! PLUGIN SECURITY WARNING !!</span>', true);
                        print('Verify source: ' + url);
                        if (found.length) found.forEach(f => print('<span class="danger-text"> ⚠ ' + f.label + ' detected</span>', true));
                        if (reqEarly) print('<span class="danger-text"> ⚠ Requires Early Load</span>', true);
                        print(`\nAdd plugin? (y/n${optEarly ? '/d' : ''})`);
                        print('<hr>', true);

                        awaitingConfirm = async (choice) => {
                            if (choice === 'y' || (optEarly && choice === 'd')) {
                                const list = (reqEarly || (optEarly && choice === 'y')) ? 'early_plugins' : 'plugins';
                                const cur = JSON.parse(localStorage.getItem(list) || '[]');
                                cur.push(url);
                                localStorage.setItem(list, JSON.stringify(cur));
                                print('Added. Restart required.');
                            } else print('Cancelled.');
                        };
                    } catch(e) { print('Add Error: ' + e.message, 'error'); }
                } else if (sub === 'list') {
                    print('<hr>', true);
                    if (!all.length) print('No plugins.');
                    all.forEach((p, i) => print(` [${i}] ${p.url} ${p.early ? '<span class="warning-text">[early]</span>' : ''}`, true));
                    print('<hr>', true);
                } else if (sub === 'remove' && parts[2]) {
                    const idx = parseInt(parts[2]);
                    if (isNaN(idx) || idx < 0 || idx >= all.length) return print('Invalid index.');
                    const p = all[idx];
                    const list = p.early ? 'early_plugins' : 'plugins';
                    const cur = JSON.parse(localStorage.getItem(list) || '[]');
                    localStorage.setItem(list, JSON.stringify(cur.filter(u => u !== p.url)));
                    print('Removed. Restart required.');
                } else if (sub === 'move' && parts[3]) {
                    const from = parseInt(parts[2]); const to = parseInt(parts[3]);
                    if (all[from] && all[to]) {
                        const item = all.splice(from, 1)[0]; all.splice(to, 0, item);
                        localStorage.setItem('plugins', JSON.stringify(all.filter(x => !x.early).map(x => x.url)));
                        localStorage.setItem('early_plugins', JSON.stringify(all.filter(x => x.early).map(x => x.url)));
                        print('Moved. Restart required.');
                    }
                } else print('Usage: plugin <add url|list|remove idx|move f t>');
                break;
            case 'changelog':
                print('<hr>', true);
                print('v1.1 Changes:', 'system');
                print(' - NoreAPI: plugins can launch full-page apps via NoreAPI.launchApp().');
                print(' - NoreAPI.onReady() hook — no race conditions between early load plugins.');
                print(' - NoreAPI Screen API: getScreen, watchScreen, replaceLastLine, and more.');
                print(' - Plugin install runs static analysis showing detected capabilities.');
                print(' - Plugin dependencies via // @requires at top of plugin file.');
                print(' - Early load plugins via // @require-earlyload or // @request-earlyload.');
                print(' - plugin move <from> <to> to reorder plugin load order.');
                print(' - Beta channel switching via enablebetafeatures / disablebetafeatures.');
                print(' - Plugin add confirmation prompt with y/n/d for request-earlyload.');
                print(' - Mobile improvements: dvh layout, iOS zoom fix, responsive ASCII banner.');
                print('<hr>', true);
                break;
            case 'version': print('<hr>', true); print('NoreOS Terminal v1.1\nChannel: Stable'); print('<hr>', true); break;
            case 'installer': localStorage.setItem('run_installer', 'true'); location.reload(); break;
            case 'reinstall': localStorage.clear(); location.reload(); break;
            case 'reboot': location.reload(); break;
            case 'enablebetafeatures':
                if (new URLSearchParams(window.location.search).has('beta')) return print('Already on beta.');
                localStorage.setItem('beta_enabled', '1');
                print('Switching to beta channel...');
                setTimeout(() => {
                    const u = new URL(window.location.href); u.searchParams.set('beta', ''); location.replace(u.toString());
                }, 1000);
                break;
            case 'disablebetafeatures':
                if (!new URLSearchParams(window.location.search).has('beta')) return print('Already on stable.');
                localStorage.setItem('beta_enabled', '0');
                print('Switching to stable channel...');
                setTimeout(() => {
                    const u = new URL(window.location.href); u.searchParams.delete('beta'); location.replace(u.toString());
                }, 1000);
                break;
            case 'safemode': location.href = location.pathname + '?safe=true'; break;
            default: print(`Unknown command: '${cmd}'. Type 'help'.`);
        }
    };

    // ==========================================
    // INITIALIZATION
    // ==========================================
    window.addEventListener('load', async () => {
        const safe = new URLSearchParams(location.search).has('safe');

        // Safe mode sequence
        let sCount = 0;
        const sCheck = (e) => { if(e.key.toLowerCase()==='s') sCount++; if(sCount>=5) { window.location.href = window.location.pathname + '?safe=true'; } };
        window.addEventListener('keydown', sCheck);
        setTimeout(() => window.removeEventListener('keydown', sCheck), 5000);

        print('<h1 class="logo-text">NOREPINEPHRINE</h1>', true);
        
        // TOS Load
        try {
            const r = await fetch('https://raw.githubusercontent.com/Norepinephrine-Tools/Terms/refs/heads/main/TOS.txt');
            tosContent = await r.text();
            tosVersionRemote = (tosContent.match(/tosver\s*=\s*(\d+)/i) || [null, '104'])[1];
        } catch(e) {}

        // Installer
        if (localStorage.getItem('run_installer') === 'true') {
            localStorage.removeItem('run_installer');
            const r = await fetch('https://raw.githubusercontent.com/padale323/Norepinephrine-Installer/refs/heads/main/Installer.js');
            new Function(await r.text())();
            return;
        }

        print('System Initialized.', 'system');
        printUsersOnline('...');

        // Analytics
        const sync = async () => {
            try {
                const r = await fetch('https://script.google.com/macros/s/AKfycbyTb30dK2Olw4fvCb5yD4YwoVTuHpKyBfzzJ83GsZ_9hTWvwRPqTC3iIb--JMTV0tJxHA/exec?hwid=' + hwid);
                const d = await r.json(); window.currentStats = d; printUsersOnline(d.active);
            } catch(e) { printUsersOnline('?'); }
        };
        sync(); setInterval(sync, 60000);

        // Plugins
        if (!safe) {
            const ep = JSON.parse(localStorage.getItem('early_plugins') || '[]');
            const p = JSON.parse(localStorage.getItem('plugins') || '[]');
            for (const url of [...ep, ...p]) await loadPlugin(url);
        } else {
            print('!!! SAFE MODE ACTIVE !!!', 'error');
        }

        readyFired = true;
        for (const fn of readyCallbacks) await fn();

        print('Ready.', 'success');
        if (localStorage.getItem('tosver') !== tosVersionRemote) print('Update TOS detected. Type "tos".', 'error');
    });

    tin.addEventListener('keydown', e => {
        if (e.key === 'Enter') { handle(tin.value); tin.value = ''; }
        else if (e.key === 'ArrowUp') { histIdx = Math.max(0, histIdx - 1); tin.value = history[histIdx] || ''; }
        else if (e.key === 'ArrowDown') { histIdx = Math.min(history.length, histIdx + 1); tin.value = history[histIdx] || ''; }
    });
    document.addEventListener('click', () => tin.focus());
</script>
</body>
</html>
