<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Norepinephrine</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; color: #ccc; overflow: hidden; font-family: monospace; }
  #root { position: fixed; inset: 0; }

  /* Recovery shell — plain text only, no theming. Off by default. */
  #recovery {
    display: none;
    position: fixed; inset: 0;
    background: #000; color: #ccc;
    font: 14px monospace;
    padding: 12px; box-sizing: border-box;
    overflow-y: auto;
    z-index: 9000;
  }
  #recovery.active { display: block; }
  #recovery div { white-space: pre-wrap; }
  #recovery input { background: transparent; border: none; outline: none; color: #ccc; font: inherit; width: 100%; }

  /* Secure Kernel Prompt Overlay */
  #secure-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.85);
    z-index: 999999; /* Highest priority, cannot be covered by apps */
    align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .secure-box {
    background: #111;
    border: 1px solid #ff4444;
    padding: 20px; width: 400px; max-width: 90%;
    box-shadow: 0 0 20px rgba(255, 68, 68, 0.2);
    text-align: center;
  }
  .secure-box h2 { margin: 0 0 15px 0; color: #ff4444; font-size: 18px; text-transform: uppercase; }
  .secure-box p { margin: 0 0 20px 0; font-size: 14px; line-height: 1.4; }
  .secure-box button {
    background: #222; border: 1px solid #555; color: #ccc;
    padding: 8px 16px; margin: 0 5px; cursor: pointer; font: inherit;
  }
  .secure-box button:hover { background: #333; }
  .secure-box button.allow { border-color: #44ff44; color: #44ff44; }
  .secure-box button.allow:hover { background: rgba(68, 255, 68, 0.1); }
</style>
</head>
<body>

<div id="root"></div>

<div id="recovery">
  <div id="recovery-out"></div>
  <div>&gt; <input id="recovery-in" autocomplete="off" spellcheck="false" style="width:80%"></div>
</div>

<!-- Kernel Security Prompt UI -->
<div id="secure-overlay">
  <div class="secure-box">
    <h2>System Security Alert</h2>
    <p id="secure-msg">An application is requesting access to a secure key.</p>
    <div>
      <button id="secure-deny">DENY</button>
      <button id="secure-allow" class="allow">ALLOW</button>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';
  const VERSION = '2.1.0';
  const root = document.getElementById('root');
  const rec = document.getElementById('recovery');
  const recOut = document.getElementById('recovery-out');
  const recIn = document.getElementById('recovery-in');

  // ---------------------------------------------------------------
  // STORAGE
  // ---------------------------------------------------------------
  const storage = {
    get: (k) => localStorage.getItem(k),
    set: (k, v) => localStorage.setItem(k, v),
    remove: (k) => localStorage.removeItem(k),
    getJSON: (k, d) => { try { const v = JSON.parse(localStorage.getItem(k)); return v === null ? d : v; } catch (e) { return d; } },
    setJSON: (k, v) => localStorage.setItem(k, JSON.stringify(v))
  };

  const hwid = (() => {
    let id = storage.get('nore_hwid');
    if (!id) { id = 'ID-' + Math.random().toString(36).slice(2, 11) + '-' + Date.now(); storage.set('nore_hwid', id); }
    return id;
  })();

  // ---------------------------------------------------------------
  // VIRTUAL FILE SYSTEM (Cookie FS)
  // A hierarchical file system built on top of localStorage.
  // ---------------------------------------------------------------
  const fsData = storage.getJSON('nore_vfs', {});
  const saveFS = () => storage.setJSON('nore_vfs', fsData);
  
  const vfs = {
    _normalize: (path) => {
      if (!path.startsWith('/')) path = '/' + path;
      return path.replace(/\/+/g, '/'); // remove double slashes
    },
    exists: (path) => vfs._normalize(path) in fsData,
    read: (path) => fsData[vfs._normalize(path)] || null,
    write: (path, data) => { fsData[vfs._normalize(path)] = data; saveFS(); },
    remove: (path) => { delete fsData[vfs._normalize(path)]; saveFS(); },
    list: (dir) => {
      let d = vfs._normalize(dir);
      if (!d.endsWith('/')) d += '/';
      const items = new Set();
      Object.keys(fsData).forEach(k => {
        if (k.startsWith(d) && k !== d) {
          const relative = k.slice(d.length);
          const slashIndex = relative.indexOf('/');
          if (slashIndex === -1) items.add(relative); // File
          else items.add(relative.slice(0, slashIndex) + '/'); // Directory
        }
      });
      return Array.from(items).sort();
    }
  };

  // ---------------------------------------------------------------
  // SECURE KEYS SYSTEM (Web Crypto API)
  // ---------------------------------------------------------------
  let masterCryptoKey = null;
  const sessionApprovals = new Set(); // Tracks keys approved this boot session

  // UI elements for the permission prompt
  const secOverlay = document.getElementById('secure-overlay');
  const secMsg = document.getElementById('secure-msg');
  const btnAllow = document.getElementById('secure-allow');
  const btnDeny = document.getElementById('secure-deny');

  // Initialize WebCrypto master key
  async function initCrypto() {
    let rawJwk = storage.getJSON('nore_master_jwk', null);
    if (!rawJwk) {
      // Generate AES-GCM 256-bit key on first run
      masterCryptoKey = await crypto.subtle.generateKey(
        { name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]
      );
      rawJwk = await crypto.subtle.exportKey("jwk", masterCryptoKey);
      storage.setJSON('nore_master_jwk', rawJwk);
    } else {
      masterCryptoKey = await crypto.subtle.importKey(
        "jwk", rawJwk, { name: "AES-GCM" }, true, ["encrypt", "decrypt"]
      );
    }
  }

  // Ask user permission via UI prompt
  function requestUserPermission(keyName) {
    return new Promise(resolve => {
      if (sessionApprovals.has(keyName)) return resolve(true);
      secMsg.innerHTML = `An environment or plugin is requesting access to the secure system key:<br><br><b style="color:#fff">${keyName}</b><br><br>Allow access for this session?`;
      secOverlay.style.display = 'flex';
      
      const cleanup = () => {
        btnAllow.onclick = null; btnDeny.onclick = null;
        secOverlay.style.display = 'none';
      };

      btnAllow.onclick = () => { sessionApprovals.add(keyName); cleanup(); resolve(true); };
      btnDeny.onclick = () => { cleanup(); resolve(false); };
    });
  }

  // ArrayBuffer <-> Base64 helpers for localStorage
  const bufToBase64 = (buf) => btoa(String.fromCharCode(...new Uint8Array(buf)));
  const base64ToBuf = (b64) => Uint8Array.from(atob(b64), c => c.charCodeAt(0));

  const secureKeys = {
    // Check if the current session already has access
    hasAccess: (keyName) => sessionApprovals.has(keyName),
    
    // Explicitly prompt for access
    requestAccess: async (keyName) => await requestUserPermission(keyName),

    // Read and decrypt a secure key (Prompts if not previously approved)
    read: async (keyName) => {
      const allowed = await requestUserPermission(keyName);
      if (!allowed) throw new Error("User denied access to secure key: " + keyName);
      
      const payload = storage.getJSON(`nore_vault_${keyName}`, null);
      if (!payload) return null;
      
      try {
        const iv = base64ToBuf(payload.iv);
        const data = base64ToBuf(payload.data);
        const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, masterCryptoKey, data);
        return new TextDecoder().decode(decrypted);
      } catch (e) {
        throw new Error("Failed to decrypt secure key (corrupted or altered).");
      }
    },

    // Encrypt and write to a secure key (Prompts if not previously approved)
    write: async (keyName, value) => {
      const allowed = await requestUserPermission(keyName);
      if (!allowed) throw new Error("User denied access to secure key: " + keyName);

      const iv = crypto.getRandomValues(new Uint8Array(12));
      const encoded = new TextEncoder().encode(value);
      const encrypted = await crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, masterCryptoKey, encoded);
      
      storage.setJSON(`nore_vault_${keyName}`, {
        iv: bufToBase64(iv),
        data: bufToBase64(encrypted)
      });
      return true;
    }
  };

  // ---------------------------------------------------------------
  // EVENT BUS
  // ---------------------------------------------------------------
  const listeners = {};
  const events = {
    on: (name, fn) => { (listeners[name] ||= []).push(fn); return () => events.off(name, fn); },
    off: (name, fn) => { if (listeners[name]) listeners[name] = listeners[name].filter((f) => f !== fn); },
    emit: (name, data) => { (listeners[name] || []).forEach((fn) => { try { fn(data); } catch (e) { console.error('[Kernel event error]', name, e); } }); }
  };

  // ---------------------------------------------------------------
  // CONFIG
  // ---------------------------------------------------------------
  const config = storage.getJSON('nore_config', { environment: null, plugins: [], early_plugins: [] });
  const saveConfig = () => storage.setJSON('nore_config', config);

  // ---------------------------------------------------------------
  // COMMAND REGISTRY
  // ---------------------------------------------------------------
  const commandRegistry = {};
  const registerCommand = (name, description, fn, source = 'kernel') => {
    commandRegistry[name.toLowerCase()] = { description, fn, source };
  };
  const unregisterCommand = (name) => { delete commandRegistry[name.toLowerCase()]; };
  const call = (name, ...args) => {
    const c = commandRegistry[name.toLowerCase()];
    if (!c) throw new Error('Unknown command: ' + name);
    return c.fn(...args);
  };

  // ---------------------------------------------------------------
  // APP REGISTRY
  // ---------------------------------------------------------------
  const appRegistry = {};
  const registerApp = (id, meta) => {
    appRegistry[id] = { id, name: meta.name || id, icon: meta.icon || '', description: meta.description || '', launch: meta.launch };
    events.emit('app-registered', id);
  };
  const unregisterApp = (id) => { delete appRegistry[id]; events.emit('app-unregistered', id); };

  // ---------------------------------------------------------------
  // TOS
  // ---------------------------------------------------------------
  const tos = {
    content: '',
    version: '104',
    get accepted() { return storage.get('tosver') === this.version; },
    accept() { storage.set('tosver', this.version); events.emit('tos-accepted'); }
  };

  let stats = { active: '?' };

  // ---------------------------------------------------------------
  // PLUGIN / ENVIRONMENT LOADER
  // ---------------------------------------------------------------
  const loadedPlugins = new Set();
  async function loadPlugin(url) {
    if (loadedPlugins.has(url)) return;
    try {
      const r = await fetch(url + '?t=' + Date.now());
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const code = await r.text();
      const deps = [...code.matchAll(/\/\/ @requires\s+(.*)/g)].map((m) => m[1].trim());
      for (const d of deps) await loadPlugin(d);
      new Function('Kernel', code)(window.Kernel);
      loadedPlugins.add(url);
      events.emit('plugin-loaded', url);
    } catch (e) {
      events.emit('plugin-error', { url, message: e.message });
    }
  }

  const ENV_TIMEOUT_MS = 10000;
  async function loadEnvironment(url) {
    if (!url) return;
    if (!tos.accepted) {
      events.emit('environment-error', { url, message: 'Terms of Service not accepted.' });
      return;
    }
    root.innerHTML = '';
    let settled = false;

    const fail = (reason) => {
      if (settled) return;
      settled = true;
      clearTimeout(timer);
      events.emit('environment-error', { url, message: reason });
      config.environment = null;
      saveConfig();
      storage.set('nore_recovery_reason', 'Environment failed: ' + reason);
      location.reload();
    };
    const ready = () => {
      if (settled) return;
      settled = true;
      clearTimeout(timer);
      events.emit('environment-loaded', url);
    };
    const timer = setTimeout(() => fail('did not confirm ready within ' + (ENV_TIMEOUT_MS / 1000) + 's'), ENV_TIMEOUT_MS);

    try {
      const r = await fetch(url + '?t=' + Date.now());
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const code = await r.text();
      if (!code.trim()) throw new Error('environment file is empty');
      new Function('Kernel', 'ready', code)(window.Kernel, ready);
    } catch (e) {
      fail(e.message);
    }
  }

  // ---------------------------------------------------------------
  // BUILT-IN COMMANDS
  // ---------------------------------------------------------------
  registerCommand('help', 'List all available commands.', () =>
    Object.entries(commandRegistry)
      .map(([name, c]) => `${name} — ${c.description}`)
      .join('\n'));

  registerCommand('version', 'Norepinephrine version info.', () => ({ version: VERSION }));
  registerCommand('reboot', 'Reload the kernel.', () => location.reload());
  registerCommand('wipe', 'Wipe all local data (config, plugins, history, VFS) and reload.', () => { localStorage.clear(); location.reload(); });
  registerCommand('safemode', 'Reboot straight to recovery.', () => { location.href = location.pathname + '?safe=true'; });
  
  registerCommand('setenv', 'Set the active environment URL.', (url) => {
    config.environment = url || null; saveConfig(); return 'Environment set. Reboot to apply.';
  });
  registerCommand('getenv', 'Get the active environment URL.', () => config.environment);

  registerCommand('tos', 'Get Terms of Service content.', () => tos.content || 'TOS not loaded yet.');
  registerCommand('accept', 'Accept the current Terms of Service.', () => { tos.accept(); return 'Accepted.'; });

  // VFS Commands
  registerCommand('ls', 'List files in VFS directory. Usage: ls <path>', (path = '/') => vfs.list(path).join('\n') || '(empty)');
  registerCommand('touch', 'Create or overwrite a file. Usage: touch <path> [content]', (path, ...content) => { vfs.write(path, content.join(' ')); return 'File saved.'; });
  registerCommand('cat', 'Read a file. Usage: cat <path>', (path) => { const f = vfs.read(path); return f === null ? 'File not found.' : f; });
  registerCommand('rm', 'Delete a file. Usage: rm <path>', (path) => { vfs.remove(path); return 'Removed.'; });

  // Keys Commands
  registerCommand('keys.write', 'Securely encrypt data. Usage: keys.write <keyName> <value>', async (key, ...val) => {
    await secureKeys.write(key, val.join(' ')); return `Saved to secure vault: ${key}`;
  });
  registerCommand('keys.read', 'Read decrypted data. Usage: keys.read <keyName>', async (key) => {
    const val = await secureKeys.read(key); return val === null ? 'Key not found.' : val;
  });

  // ---------------------------------------------------------------
  // PUBLIC KERNEL API
  // ---------------------------------------------------------------
  let readyFired = false;
  const readyCallbacks = [];
  window.Kernel = {
    version: VERSION,
    hwid,
    root,
    storage,
    vfs,             // Expose Cookie FS
    keys: secureKeys, // Expose Secure Crypto Storage
    events,
    tos,
    get stats() { return stats; },
    config: { get: () => JSON.parse(JSON.stringify(config)), save: saveConfig },
    commands: commandRegistry,
    registerCommand,
    unregisterCommand,
    call,
    apps: appRegistry,
    registerApp,
    unregisterApp,
    loadPlugin,
    loadEnvironment,
    run: (line) => execCommandLine(line, (t) => console.log(t)),
    onReady: (fn) => { readyFired ? fn() : readyCallbacks.push(fn); },
    _loadedPlugins: loadedPlugins
  };

  // ---------------------------------------------------------------
  // RECOVERY SHELL
  // ---------------------------------------------------------------
  function recPrint(t) {
    const d = document.createElement('div');
    d.className = 'line';
    d.textContent = t;
    recOut.appendChild(d);
    rec.scrollTop = rec.scrollHeight;
  }
  function enterRecovery(reason) {
    if (rec.classList.contains('active')) return;
    rec.classList.add('active');
    recPrint('Norepinephrine recovery — v' + VERSION);
    recPrint('If you are seeing this, something went wrong, or you haven\'t configured Norepinephrine yet.');
    const stored = storage.get('nore_recovery_reason');
    if (stored) { recPrint(stored); storage.remove('nore_recovery_reason'); }
    if (reason) recPrint(reason);
    recPrint('Type "help" for commands.');
    recIn.focus();
  }

  async function execCommandLine(line, printFn) {
    const trimmed = (line || '').trim();
    if (!trimmed) return;
    printFn('> ' + trimmed);
    
    // Simple parser for quotes and spaces
    const args = trimmed.match(/(?:[^\s"]+|"[^"]*")+/g).map(s => s.replace(/(^"|"$)/g, ''));
    const name = args.shift();

    const c = commandRegistry[name.toLowerCase()];
    if (!c) { printFn('Unknown command: ' + name); return; }
    try {
      const result = await c.fn(...args);
      if (result !== undefined) printFn(typeof result === 'string' ? result : JSON.stringify(result, null, 2));
      return result;
    } catch (err) { printFn('Error: ' + err.message); }
  }

  recIn.addEventListener('keydown', async (e) => {
    if (e.key !== 'Enter') return;
    const val = recIn.value; recIn.value = '';
    await execCommandLine(val, recPrint);
  });
  document.addEventListener('click', () => { if (rec.classList.contains('active')) recIn.focus(); });

  let rCount = 0;
  const rCheck = (e) => { if (e.key.toLowerCase() === 'r') { rCount++; if (rCount >= 5) { window.removeEventListener('keydown', rCheck); enterRecovery('(forced open via key sequence)'); } } };
  window.addEventListener('keydown', rCheck);
  setTimeout(() => window.removeEventListener('keydown', rCheck), 8000);

  // ---------------------------------------------------------------
  // BOOT SEQUENCE
  // ---------------------------------------------------------------
  window.addEventListener('load', async () => {
    // 1. Initialize core cryptography for Keys system before booting environments
    await initCrypto();

    const params = new URLSearchParams(location.search);
    const safe = params.has('safe');
    const forceRecovery = params.has('recovery');

    try {
      const r = await fetch('https://raw.githubusercontent.com/Norepinephrine-Tools/Terms/refs/heads/main/TOS.txt');
      tos.content = await r.text();
      tos.version = (tos.content.match(/tosver\s*=\s*(\d+)/i) || [null, '104'])[1];
    } catch (e) {}
    const sync = async () => {
      try {
        const r = await fetch('https://script.google.com/macros/s/AKfycbyTb30dK2Olw4fvCb5yD4YwoVTuHpKyBfzzJ83GsZ_9hTWvwRPqTC3iIb--JMTV0tJxHA/exec?hwid=' + hwid);
        stats = await r.json();
        events.emit('stats', stats);
      } catch (e) {}
    };
    sync(); setInterval(sync, 60000);

    if (forceRecovery) { enterRecovery(); readyFired = true; for (const fn of readyCallbacks) await fn(); return; }
    if (safe) { enterRecovery('Safe mode: plugins were not loaded.'); readyFired = true; for (const fn of readyCallbacks) await fn(); return; }
    if (!config.environment) { enterRecovery(); readyFired = true; for (const fn of readyCallbacks) await fn(); return; }
    if (!tos.accepted) { enterRecovery('Terms of Service not accepted. Type "tos" then "accept", then "reboot".'); readyFired = true; for (const fn of readyCallbacks) await fn(); return; }

    for (const url of config.early_plugins) await loadPlugin(url);

    readyFired = true;
    for (const fn of readyCallbacks) await fn();

    for (const url of config.plugins) await loadPlugin(url);

    await loadEnvironment(config.environment);
  });
})();
</script>
</body>
</html>
