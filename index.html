<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Norepinephrine</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; color: #ccc; overflow: hidden; }
  #root { position: fixed; inset: 0; }

  /* Recovery shell — plain text only, no theming. Off by default. */
  #recovery {
    display: none;
    position: fixed; inset: 0;
    background: #000; color: #ccc;
    font: 14px monospace;
    padding: 12px; box-sizing: border-box;
    overflow-y: auto;
  }
  #recovery.active { display: block; }
  #recovery div { white-space: pre-wrap; }
  #recovery input { background: transparent; border: none; outline: none; color: #ccc; font: inherit; width: 100%; }
</style>
</head>
<body>

<div id="root"></div>

<div id="recovery">
  <div id="recovery-out"></div>
  <div>&gt; <input id="recovery-in" autocomplete="off" spellcheck="false" style="width:80%"></div>
</div>

<script>
(function () {
  'use strict';
  const VERSION = '2.0.0';
  const root = document.getElementById('root');
  const rec = document.getElementById('recovery');
  const recOut = document.getElementById('recovery-out');
  const recIn = document.getElementById('recovery-in');

  // ---------------------------------------------------------------
  // STORAGE
  // ---------------------------------------------------------------
  const storage = {
    get: (k) => localStorage.getItem(k),
    set: (k, v) => localStorage.setItem(k, v),
    remove: (k) => localStorage.removeItem(k),
    getJSON: (k, d) => { try { const v = JSON.parse(localStorage.getItem(k)); return v === null ? d : v; } catch (e) { return d; } },
    setJSON: (k, v) => localStorage.setItem(k, JSON.stringify(v))
  };

  const hwid = (() => {
    let id = storage.get('nore_hwid');
    if (!id) { id = 'ID-' + Math.random().toString(36).slice(2, 11) + '-' + Date.now(); storage.set('nore_hwid', id); }
    return id;
  })();

  // ---------------------------------------------------------------
  // EVENT BUS  (environments/plugins talk to each other through this)
  // ---------------------------------------------------------------
  const listeners = {};
  const events = {
    on: (name, fn) => { (listeners[name] ||= []).push(fn); return () => events.off(name, fn); },
    off: (name, fn) => { if (listeners[name]) listeners[name] = listeners[name].filter((f) => f !== fn); },
    emit: (name, data) => { (listeners[name] || []).forEach((fn) => { try { fn(data); } catch (e) { console.error('[Kernel event error]', name, e); } }); }
  };

  // ---------------------------------------------------------------
  // CONFIG  (which environment to boot into, which plugins to load)
  // ---------------------------------------------------------------
  const config = storage.getJSON('nore_config', { environment: null, plugins: [], early_plugins: [] });
  const saveConfig = () => storage.setJSON('nore_config', config);

  // ---------------------------------------------------------------
  // COMMAND REGISTRY  (kernel "syscalls" — any environment's UI calls these)
  // ---------------------------------------------------------------
  const commandRegistry = {};
  const registerCommand = (name, description, fn, source = 'kernel') => {
    commandRegistry[name.toLowerCase()] = { description, fn, source };
  };
  const unregisterCommand = (name) => { delete commandRegistry[name.toLowerCase()]; };
  const call = (name, ...args) => {
    const c = commandRegistry[name.toLowerCase()];
    if (!c) throw new Error('Unknown command: ' + name);
    return c.fn(...args);
  };

  // ---------------------------------------------------------------
  // TOS
  // ---------------------------------------------------------------
  const tos = {
    content: '',
    version: '104',
    get accepted() { return storage.get('tosver') === this.version; },
    accept() { storage.set('tosver', this.version); events.emit('tos-accepted'); }
  };

  // ---------------------------------------------------------------
  // STATS (background analytics ping)
  // ---------------------------------------------------------------
  let stats = { active: '?' };

  // ---------------------------------------------------------------
  // PLUGIN / ENVIRONMENT LOADER
  // Plugins are background services. An "environment" is just a plugin
  // that takes ownership of Kernel.root and draws a whole UI into it
  // (a CLI, a KDE-style desktop, whatever). Only one environment loads
  // per boot, chosen by config.environment.
  // ---------------------------------------------------------------
  const loadedPlugins = new Set();
  async function loadPlugin(url) {
    if (loadedPlugins.has(url)) return;
    try {
      const r = await fetch(url + '?t=' + Date.now());
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const code = await r.text();
      const deps = [...code.matchAll(/\/\/ @requires\s+(.*)/g)].map((m) => m[1].trim());
      for (const d of deps) await loadPlugin(d);
      new Function('Kernel', code)(window.Kernel);
      loadedPlugins.add(url);
      events.emit('plugin-loaded', url);
    } catch (e) {
      events.emit('plugin-error', { url, message: e.message });
    }
  }

  // An environment must call the `ready` callback it's given within
  // ENV_TIMEOUT_MS of being loaded. If it doesn't (blank/broken/empty
  // file, infinite hang, whatever) it's treated as failed: the kernel
  // clears it from config and reloads, which drops straight to recovery
  // per the boot sequence below. This never inspects root.innerHTML —
  // an environment that's still legitimately loading async resources
  // before its first render is not "empty", it just hasn't called
  // ready() yet, so only the explicit signal (or the deadline) counts.
  const ENV_TIMEOUT_MS = 10000;
  async function loadEnvironment(url) {
    if (!url) return;
    root.innerHTML = '';
    let settled = false;

    const fail = (reason) => {
      if (settled) return;
      settled = true;
      clearTimeout(timer);
      events.emit('environment-error', { url, message: reason });
      config.environment = null;
      saveConfig();
      storage.set('nore_recovery_reason', 'Environment failed: ' + reason);
      location.reload();
    };
    const ready = () => {
      if (settled) return;
      settled = true;
      clearTimeout(timer);
      events.emit('environment-loaded', url);
    };
    const timer = setTimeout(() => fail('did not confirm ready within ' + (ENV_TIMEOUT_MS / 1000) + 's'), ENV_TIMEOUT_MS);

    try {
      const r = await fetch(url + '?t=' + Date.now());
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const code = await r.text();
      if (!code.trim()) throw new Error('environment file is empty');
      new Function('Kernel', 'ready', code)(window.Kernel, ready);
    } catch (e) {
      fail(e.message);
    }
  }

  // ---------------------------------------------------------------
  // BUILT-IN COMMANDS  (every environment gets these for free)
  // ---------------------------------------------------------------
  registerCommand('help', 'List all available commands.', () =>
    Object.entries(commandRegistry).map(([name, c]) => ({ name, description: c.description, source: c.source })));

  registerCommand('version', 'Kernel version info.', () => ({ version: VERSION }));
  registerCommand('reboot', 'Reload the kernel.', () => location.reload());
  registerCommand('wipe', 'Wipe all local data (config, plugins, history) and reload.', () => { localStorage.clear(); location.reload(); });
  registerCommand('safemode', 'Reboot with plugins and environment skipped, straight to recovery.', () => { location.href = location.pathname + '?safe=true'; });
  registerCommand('recovery', 'Reboot straight into the recovery shell.', () => { location.href = location.pathname + '?recovery=true'; });

  registerCommand('setenv', 'Set the active environment URL. Usage: setenv <url>', (url) => {
    config.environment = url || null; saveConfig();
    return 'Environment set to ' + config.environment + '. Reboot to apply.';
  });
  registerCommand('getenv', 'Get the active environment URL.', () => config.environment);

  registerCommand('tos', 'Get Terms of Service content.', () => tos.content || 'TOS not loaded yet.');
  registerCommand('accept', 'Accept the current Terms of Service.', () => { tos.accept(); return 'Accepted.'; });
  registerCommand('stats', 'Get live network stats.', () => stats);

  registerCommand('plugin.list', 'List installed plugins.', () => [
    ...config.plugins.map((u) => ({ url: u, early: false })),
    ...config.early_plugins.map((u) => ({ url: u, early: true }))
  ]);
  registerCommand('plugin.add', 'Add a plugin. Usage: plugin.add <url> [early]', (url, early) => {
    if (!url) return 'Usage: plugin.add <url> [early]';
    const isEarly = early === true || early === 'true' || early === '1';
    if (config.plugins.includes(url) || config.early_plugins.includes(url)) return 'Already installed.';
    (isEarly ? config.early_plugins : config.plugins).push(url);
    saveConfig();
    return 'Added' + (isEarly ? ' (early-load)' : '') + '. Reboot to apply.';
  });
  registerCommand('plugin.remove', 'Remove a plugin by URL.', (url) => {
    config.plugins = config.plugins.filter((u) => u !== url);
    config.early_plugins = config.early_plugins.filter((u) => u !== url);
    saveConfig();
    return 'Removed. Reboot to apply.';
  });
  registerCommand('plugin.move', 'Reorder within a list. Usage: plugin.move <from> <to> [early]', (from, to, early) => {
    const isEarly = early === true || early === 'true' || early === '1';
    const list = isEarly ? config.early_plugins : config.plugins;
    const f = parseInt(from, 10), t = parseInt(to, 10);
    if (!(f in list) || !(t in list)) return 'Invalid indices.';
    const item = list.splice(f, 1)[0]; list.splice(t, 0, item);
    saveConfig();
    return 'Moved.';
  });

  registerCommand('beta.enable', 'Switch to the beta channel.', () => {
    storage.set('beta_enabled', '1');
    const u = new URL(location.href); u.searchParams.set('beta', ''); location.replace(u.toString());
  });
  registerCommand('beta.disable', 'Switch to the stable channel.', () => {
    storage.set('beta_enabled', '0');
    const u = new URL(location.href); u.searchParams.delete('beta'); location.replace(u.toString());
  });

  // ---------------------------------------------------------------
  // PUBLIC KERNEL API — this is the entire surface environments/plugins get.
  // ---------------------------------------------------------------
  let readyFired = false;
  const readyCallbacks = [];
  window.Kernel = {
    version: VERSION,
    hwid,
    root,                       // the only DOM node an environment is allowed to assume exists
    storage,
    events,
    tos,
    get stats() { return stats; },
    config: { get: () => JSON.parse(JSON.stringify(config)), save: saveConfig },
    commands: commandRegistry,
    registerCommand,
    unregisterCommand,
    call,
    loadPlugin,
    loadEnvironment,
    // Runs a recovery-style command line even with no UI on screen —
    // e.g. open devtools and call: Kernel.run('setenv <url>')
    run: (line) => execCommandLine(line, (t) => console.log(t)),
    onReady: (fn) => { readyFired ? fn() : readyCallbacks.push(fn); },
    _loadedPlugins: loadedPlugins
  };

  // ---------------------------------------------------------------
  // RECOVERY SHELL
  // This is the ONLY built-in UI the kernel ever draws, and it never
  // draws itself unless: (a) no environment is configured yet — like a
  // fresh distro install with no display manager, (b) ?safe=true or
  // ?recovery=true is in the URL, or (c) a hidden key sequence is used.
  // It's a flat command runner over the same registry environments use.
  // ---------------------------------------------------------------
  function recPrint(t) {
    const d = document.createElement('div');
    d.className = 'line';
    d.textContent = t;
    recOut.appendChild(d);
    rec.scrollTop = rec.scrollHeight;
  }
  function enterRecovery(reason) {
    if (rec.classList.contains('active')) return;
    rec.classList.add('active');
    recPrint('Norepinephrine recovery — v' + VERSION);
    recPrint('If you are seeing this, something went wrong, or you haven\'t configured Norepinephrine yet.');
    const stored = storage.get('nore_recovery_reason');
    if (stored) { recPrint(stored); storage.remove('nore_recovery_reason'); }
    if (reason) recPrint(reason);
    recPrint('Type "help" for commands.');
    recIn.focus();
  }

  // Shared by the on-screen recovery input AND by Kernel.run(), so the
  // same commands work even when the screen is black and recovery was
  // never shown — open devtools and run e.g. Kernel.run('setenv <url>').
  async function execCommandLine(line, printFn) {
    const trimmed = (line || '').trim();
    if (!trimmed) return;
    printFn('> ' + trimmed);
    const [name, ...rest] = trimmed.split(/\s+/);
    const c = commandRegistry[name.toLowerCase()];
    if (!c) { printFn('Unknown command: ' + name); return; }
    try {
      const result = await c.fn(...rest);
      if (result !== undefined) printFn(typeof result === 'string' ? result : JSON.stringify(result, null, 2));
      return result;
    } catch (err) { printFn('Error: ' + err.message); }
  }

  recIn.addEventListener('keydown', async (e) => {
    if (e.key !== 'Enter') return;
    const val = recIn.value; recIn.value = '';
    await execCommandLine(val, recPrint);
  });
  document.addEventListener('click', () => { if (rec.classList.contains('active')) recIn.focus(); });

  // Hidden bootstrap: hold "R" five times in the first few seconds to
  // force the recovery shell open even if an environment is running —
  // same idea as the old "hold S for safe mode" trick.
  let rCount = 0;
  const rCheck = (e) => { if (e.key.toLowerCase() === 'r') { rCount++; if (rCount >= 5) { window.removeEventListener('keydown', rCheck); enterRecovery('(forced open via key sequence)'); } } };
  window.addEventListener('keydown', rCheck);
  setTimeout(() => window.removeEventListener('keydown', rCheck), 8000);

  // ---------------------------------------------------------------
  // BOOT SEQUENCE
  // ---------------------------------------------------------------
  window.addEventListener('load', async () => {
    const params = new URLSearchParams(location.search);
    const safe = params.has('safe');
    const forceRecovery = params.has('recovery');

    // TOS + analytics run silently in the background regardless of UI.
    (async () => {
      try {
        const r = await fetch('https://raw.githubusercontent.com/Norepinephrine-Tools/Terms/refs/heads/main/TOS.txt');
        tos.content = await r.text();
        tos.version = (tos.content.match(/tosver\s*=\s*(\d+)/i) || [null, '104'])[1];
      } catch (e) {}
    })();
    const sync = async () => {
      try {
        const r = await fetch('https://script.google.com/macros/s/AKfycbyTb30dK2Olw4fvCb5yD4YwoVTuHpKyBfzzJ83GsZ_9hTWvwRPqTC3iIb--JMTV0tJxHA/exec?hwid=' + hwid);
        stats = await r.json();
        events.emit('stats', stats);
      } catch (e) {}
    };
    sync(); setInterval(sync, 60000);

    // Recovery never loads plugins — forced recovery, safe mode, and
    // "no environment configured" all skip straight past the loader.
    if (forceRecovery) { enterRecovery(); readyFired = true; for (const fn of readyCallbacks) await fn(); return; }
    if (safe) { enterRecovery('Safe mode: plugins were not loaded.'); readyFired = true; for (const fn of readyCallbacks) await fn(); return; }
    if (!config.environment) { enterRecovery(); readyFired = true; for (const fn of readyCallbacks) await fn(); return; }

    for (const url of config.early_plugins) await loadPlugin(url);

    readyFired = true;
    for (const fn of readyCallbacks) await fn();

    for (const url of config.plugins) await loadPlugin(url);

    await loadEnvironment(config.environment);
  });
})();
</script>
</body>
</html>
