<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Norepinephrine Kernel</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; color: #ccc; overflow: hidden; font-family: monospace; }
  #root { position: fixed; inset: 0; }

  /* Recovery shell */
  #recovery {
    display: none;
    position: fixed; inset: 0;
    background: #000; color: #ccc;
    font: 14px monospace;
    padding: 12px; box-sizing: border-box;
    overflow-y: auto;
    z-index: 9000;
  }
  #recovery.active { display: block; }
  #recovery div { white-space: pre-wrap; }
  #recovery input { background: transparent; border: none; outline: none; color: #ccc; font: inherit; width: 100%; }

  /* Secure Kernel Prompt Overlay */
  #secure-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.85);
    z-index: 999999;
    align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .secure-box {
    background: #111;
    border: 1px solid #ff4444;
    padding: 20px; width: 400px; max-width: 90%;
    box-shadow: 0 0 20px rgba(255, 68, 68, 0.2);
    text-align: center;
  }
  .secure-box h2 { margin: 0 0 15px 0; color: #ff4444; font-size: 18px; text-transform: uppercase; }
  .secure-box p { margin: 0 0 20px 0; font-size: 14px; line-height: 1.4; }
  .secure-box button {
    background: #222; border: 1px solid #555; color: #ccc;
    padding: 8px 16px; margin: 0 5px; cursor: pointer; font: inherit;
  }
  .secure-box button:hover { background: #333; }
  .secure-box button.allow { border-color: #44ff44; color: #44ff44; }
  .secure-box button.allow:hover { background: rgba(68, 255, 68, 0.1); }
</style>
</head>
<body>

<div id="root"></div>

<div id="recovery">
  <div id="recovery-out"></div>
  <div>&gt; <input id="recovery-in" autocomplete="off" spellcheck="false" style="width:80%"></div>
</div>

<div id="secure-overlay">
  <div class="secure-box">
    <h2>System Security Alert</h2>
    <p id="secure-msg">An application is requesting access to a secure resource.</p>
    <div>
      <button id="secure-deny">DENY</button>
      <button id="secure-allow" class="allow">ALLOW</button>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';
  const VERSION = '3.0.0';
  const root = document.getElementById('root');
  const rec = document.getElementById('recovery');
  const recOut = document.getElementById('recovery-out');
  const recIn = document.getElementById('recovery-in');

  // ---------------------------------------------------------------
  // KERNEL STORAGE & HWID
  // ---------------------------------------------------------------
  const storage = {
    get: (k) => localStorage.getItem(k),
    set: (k, v) => localStorage.setItem(k, v),
    remove: (k) => localStorage.removeItem(k),
    getJSON: (k, d) => { try { const v = JSON.parse(localStorage.getItem(k)); return v === null ? d : v; } catch (e) { return d; } },
    setJSON: (k, v) => localStorage.setItem(k, JSON.stringify(v))
  };

  const hwid = (() => {
    let id = storage.get('nore_hwid');
    if (!id) { id = 'ID-' + Math.random().toString(36).slice(2, 11) + '-' + Date.now(); storage.set('nore_hwid', id); }
    return id;
  })();

  // ---------------------------------------------------------------
  // INDEXEDDB VIRTUAL FILE SYSTEM (Strict /root/ scoping & formatting)
  // ---------------------------------------------------------------
  let db = null;
  const initVFSDB = () => new Promise((resolve, reject) => {
    const req = indexedDB.open('NorepinephrineVFS', 1);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('files')) {
        d.createObjectStore('files', { keyPath: 'path' });
      }
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
    req.onerror = (e) => reject('Failed to open IndexedDB VFS');
  });

  const vfs = {
    _normalize: (path) => {
      if (!path) path = '/root/';
      if (!path.startsWith('/root')) {
        path = '/root/' + path.replace(/^\/+/, '');
      }
      return path.replace(/\/+/g, '/');
    },

    // Format handling based on file extensions
    _formatData: (path, content, mode = 'write') => {
      if (mode === 'write') {
        if (path.endsWith('.json') && typeof content !== 'string') {
          return JSON.stringify(content, null, 2);
        }
        return content;
      } else {
        if (path.endsWith('.json') && typeof content === 'string') {
          try { return JSON.parse(content); } catch (e) { return content; }
        }
        return content;
      }
    },

    mkdir: (path) => new Promise((resolve, reject) => {
      const norm = vfs._normalize(path);
      const tx = db.transaction('files', 'readwrite');
      const store = tx.objectStore('files');
      const node = { path: norm, type: 'dir', created: Date.now(), updated: Date.now() };
      const req = store.put(node);
      req.onsuccess = () => resolve(true);
      req.onerror = () => reject('Failed to create directory');
    }),

    write: (path, content) => new Promise((resolve, reject) => {
      const norm = vfs._normalize(path);
      const formatted = vfs._formatData(norm, content, 'write');
      const tx = db.transaction('files', 'readwrite');
      const store = tx.objectStore('files');
      const node = { path: norm, type: 'file', content: formatted, updated: Date.now() };
      const req = store.put(node);
      req.onsuccess = () => resolve(true);
      req.onerror = () => reject('Failed to write file');
    }),

    read: (path) => new Promise((resolve, reject) => {
      const norm = vfs._normalize(path);
      const tx = db.transaction('files', 'readonly');
      const store = tx.objectStore('files');
      const req = store.get(norm);
      req.onsuccess = () => {
        if (!req.result) return resolve(null);
        if (req.result.type === 'dir') return resolve('[Directory]');
        resolve(vfs._formatData(norm, req.result.content, 'read'));
      };
      req.onerror = () => reject('Failed to read file');
    }),

    remove: (path) => new Promise((resolve, reject) => {
      const norm = vfs._normalize(path);
      const tx = db.transaction('files', 'readwrite');
      const store = tx.objectStore('files');
      const req = store.delete(norm);
      req.onsuccess = () => resolve(true);
      req.onerror = () => reject('Failed to remove node');
    }),

    list: (dir = '/root/') => new Promise((resolve, reject) => {
      let norm = vfs._normalize(dir);
      if (!norm.endsWith('/')) norm += '/';
      const tx = db.transaction('files', 'readonly');
      const store = tx.objectStore('files');
      const req = store.getAllKeys();
      req.onsuccess = () => {
        const items = new Set();
        req.result.forEach(k => {
          if (k.startsWith(norm) && k !== norm) {
            const relative = k.slice(norm.length);
            const slashIndex = relative.indexOf('/');
            if (slashIndex === -1) items.add(relative);
            else items.add(relative.slice(0, slashIndex) + '/');
          }
        });
        resolve(Array.from(items).sort());
      };
      req.onerror = () => reject('Failed to list directory');
    })
  };

  // ---------------------------------------------------------------
  // PROCESS SCHEDULER & PID MANAGER
  // ---------------------------------------------------------------
  let nextPID = 100;
  const processTable = new Map();

  class Process {
    constructor(name, execFn, parentPID = 0) {
      this.pid = nextPID++;
      this.name = name;
      this.parentPID = parentPID;
      this.state = 'RUNNING';
      this.execFn = execFn;
      this.stdin = [];
      this.stdout = [];
      this.stderr = [];
      this.ipcListeners = [];
    }

    sendSignal(sig) {
      switch (sig) {
        case 'SIGKILL':
        case 'SIGTERM':
          this.state = 'ZOMBIE';
          processTable.delete(this.pid);
          events.emit('process-terminated', this.pid);
          break;
        case 'SIGSTOP':
          this.state = 'SUSPENDED';
          break;
        case 'SIGCONT':
          this.state = 'RUNNING';
          break;
      }
    }
  }

  const pids = {
    spawn: (name, execFn, parentPID = 0) => {
      const proc = new Process(name, execFn, parentPID);
      processTable.set(proc.pid, proc);
      events.emit('process-spawned', { pid: proc.pid, name });
      try {
        proc.execFn(proc);
      } catch (e) {
        proc.stderr.push(e.message);
        proc.sendSignal('SIGKILL');
      }
      return proc.pid;
    },
    kill: (pid, signal = 'SIGTERM') => {
      const proc = processTable.get(pid);
      if (proc) {
        proc.sendSignal(signal);
        return true;
      }
      return false;
    },
    list: () => Array.from(processTable.values()).map(p => ({ pid: p.pid, name: p.name, state: p.state, ppid: p.parentPID }))
  };

  // ---------------------------------------------------------------
  // INTER-PROCESS COMMUNICATION (IPC)
  // ---------------------------------------------------------------
  const ipc = {
    send: (targetPID, channel, data) => {
      const proc = processTable.get(targetPID);
      if (proc && proc.state === 'RUNNING') {
        proc.ipcListeners.forEach(cb => cb({ channel, data, sender: targetPID }));
        return true;
      }
      return false;
    },
    listen: (pid, callback) => {
      const proc = processTable.get(pid);
      if (proc) {
        proc.ipcListeners.push(callback);
      }
    }
  };

  // ---------------------------------------------------------------
  // SECURE KEYS SYSTEM
  // ---------------------------------------------------------------
  let masterCryptoKey = null;
  const sessionApprovals = new Set();

  const secOverlay = document.getElementById('secure-overlay');
  const secMsg = document.getElementById('secure-msg');
  const btnAllow = document.getElementById('secure-allow');
  const btnDeny = document.getElementById('secure-deny');

  async function initCrypto() {
    let rawJwk = storage.getJSON('nore_master_jwk', null);
    if (!rawJwk) {
      masterCryptoKey = await crypto.subtle.generateKey(
        { name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]
      );
      rawJwk = await crypto.subtle.exportKey("jwk", masterCryptoKey);
      storage.setJSON('nore_master_jwk', rawJwk);
    } else {
      masterCryptoKey = await crypto.subtle.importKey(
        "jwk", rawJwk, { name: "AES-GCM" }, true, ["encrypt", "decrypt"]
      );
    }
  }

  function requestUserPermission(msg) {
    return new Promise(resolve => {
      secMsg.innerHTML = msg;
      secOverlay.style.display = 'flex';
      
      const cleanup = () => {
        btnAllow.onclick = null; btnDeny.onclick = null;
        secOverlay.style.display = 'none';
      };

      btnAllow.onclick = () => { cleanup(); resolve(true); };
      btnDeny.onclick = () => { cleanup(); resolve(false); };
    });
  }

  const bufToBase64 = (buf) => btoa(String.fromCharCode(...new Uint8Array(buf)));
  const base64ToBuf = (b64) => Uint8Array.from(atob(b64), c => c.charCodeAt(0));

  const secureKeys = {
    read: async (keyName) => {
      if (!sessionApprovals.has(keyName)) {
        const allowed = await requestUserPermission(`Access requested to secure key:<br><br><b style="color:#fff">${keyName}</b>`);
        if (!allowed) throw new Error("Denied secure key: " + keyName);
        sessionApprovals.add(keyName);
      }
      const payload = storage.getJSON(`nore_vault_${keyName}`, null);
      if (!payload) return null;
      const iv = base64ToBuf(payload.iv);
      const data = base64ToBuf(payload.data);
      const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, masterCryptoKey, data);
      return new TextDecoder().decode(decrypted);
    },
    write: async (keyName, value) => {
      if (!sessionApprovals.has(keyName)) {
        const allowed = await requestUserPermission(`Write access requested to secure key:<br><br><b style="color:#fff">${keyName}</b>`);
        if (!allowed) throw new Error("Denied secure key: " + keyName);
        sessionApprovals.add(keyName);
      }
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const encoded = new TextEncoder().encode(value);
      const encrypted = await crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, masterCryptoKey, encoded);
      storage.setJSON(`nore_vault_${keyName}`, { iv: bufToBase64(iv), data: bufToBase64(encrypted) });
      return true;
    }
  };

  // ---------------------------------------------------------------
  // SYSCALL SECURITY GATEWAY
  // ---------------------------------------------------------------
  const syscalls = {
    read: (path) => vfs.read(path),
    write: (path, data) => vfs.write(path, data),
    mkdir: (path) => vfs.mkdir(path),
    spawn: (name, fn, ppid) => pids.spawn(name, fn, ppid),
    kill: (pid, sig) => pids.kill(pid, sig),
    ipcSend: (pid, channel, data) => ipc.send(pid, channel, data),
    requestPermission: (reason) => requestUserPermission(reason)
  };

  // ---------------------------------------------------------------
  // EVENT BUS & CONFIG
  // ---------------------------------------------------------------
  const listeners = {};
  const events = {
    on: (name, fn) => { (listeners[name] ||= []).push(fn); return () => events.off(name, fn); },
    off: (name, fn) => { if (listeners[name]) listeners[name] = listeners[name].filter((f) => f !== fn); },
    emit: (name, data) => { (listeners[name] || []).forEach((fn) => { try { fn(data); } catch (e) { console.error('[Kernel event error]', name, e); } }); }
  };

  const config = storage.getJSON('nore_config', { environment: null, plugins: [], early_plugins: [] });
  const saveConfig = () => storage.setJSON('nore_config', config);

  // ---------------------------------------------------------------
  // REGISTRIES
  // ---------------------------------------------------------------
  const commandRegistry = {};
  const registerCommand = (name, description, fn) => { commandRegistry[name.toLowerCase()] = { description, fn }; };

  const appRegistry = {};
  const registerApp = (id, meta) => {
    appRegistry[id] = { id, name: meta.name || id, icon: meta.icon || '', launch: meta.launch };
    events.emit('app-registered', id);
  };

  const tos = {
    content: '',
    version: '104',
    get accepted() { return storage.get('tosver') === this.version; },
    accept() { storage.set('tosver', this.version); events.emit('tos-accepted'); }
  };

  // ---------------------------------------------------------------
  // BUILT-IN COMMANDS
  // ---------------------------------------------------------------
  registerCommand('help', 'List commands.', () => Object.entries(commandRegistry).map(([n, c]) => `${n} — ${c.description}`).join('\n'));
  registerCommand('version', 'Norepinephrine version.', () => ({ version: VERSION }));
  registerCommand('reboot', 'Reload kernel.', () => location.reload());
  registerCommand('ps', 'List processes.', () => pids.list());
  registerCommand('kill', 'Kill process PID.', (pid) => pids.kill(parseInt(pid, 10)) ? 'Killed.' : 'Process not found.');
  registerCommand('ls', 'List directory files. Usage: ls [path]', async (path = '/root/') => (await vfs.list(path)).join('\n') || '(empty)');
  registerCommand('touch', 'Write a file. Usage: touch <path> [content]', async (path, ...content) => { await vfs.write(path, content.join(' ')); return 'File written.'; });
  registerCommand('cat', 'Read a file. Usage: cat <path>', async (path) => { const f = await vfs.read(path); return f === null ? 'File not found.' : f; });

  // ---------------------------------------------------------------
  // PUBLIC KERNEL EXPOSE
  // ---------------------------------------------------------------
  window.Kernel = {
    version: VERSION,
    hwid,
    root,
    storage,
    vfs,
    pids,
    ipc,
    sys: syscalls,
    keys: secureKeys,
    events,
    tos,
    config: { get: () => JSON.parse(JSON.stringify(config)), save: saveConfig },
    commands: commandRegistry,
    registerCommand,
    apps: appRegistry,
    registerApp,
    run: (line) => execCommandLine(line, (t) => console.log(t))
  };

  // ---------------------------------------------------------------
  // RECOVERY & BOOT
  // ---------------------------------------------------------------
  function recPrint(t) {
    const d = document.createElement('div');
    d.textContent = t;
    recOut.appendChild(d);
    rec.scrollTop = rec.scrollHeight;
  }

  function enterRecovery(reason) {
    rec.classList.add('active');
    recPrint(`Norepinephrine Recovery Shell v${VERSION}`);
    if (reason) recPrint(reason);
    recIn.focus();
  }

  async function execCommandLine(line, printFn) {
    const trimmed = (line || '').trim();
    if (!trimmed) return;
    printFn('> ' + trimmed);
    const args = trimmed.match(/(?:[^\s"]+|"[^"]*")+/g).map(s => s.replace(/(^"|"$)/g, ''));
    const name = args.shift();

    const c = commandRegistry[name.toLowerCase()];
    if (!c) { printFn('Unknown command: ' + name); return; }
    try {
      const result = await c.fn(...args);
      if (result !== undefined) printFn(typeof result === 'string' ? result : JSON.stringify(result, null, 2));
    } catch (err) { printFn('Error: ' + err.message); }
  }

  recIn.addEventListener('keydown', async (e) => {
    if (e.key === 'Enter') {
      const val = recIn.value; recIn.value = '';
      await execCommandLine(val, recPrint);
    }
  });

  window.addEventListener('load', async () => {
    await initVFSDB();
    await initCrypto();
    await vfs.mkdir('/root/');

    if (!config.environment) {
      enterRecovery('No OS environment registered. Use "setenv <url>" to pair with Axon.');
      return;
    }

    try {
      const r = await fetch(config.environment + '?t=' + Date.now());
      const code = await r.text();
      new Function('Kernel', 'ready', code)(window.Kernel, () => events.emit('environment-loaded'));
    } catch (e) {
      enterRecovery('Failed to boot environment: ' + e.message);
    }
  });
})();
</script>
</body>
</html>
