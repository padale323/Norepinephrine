<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Norepinephrine</title>
    <style>
        :root { --glow: #ffffff; --bg: #0a0c10; --dim: #8b949e; --blue: #58a6ff; --warn: #ffcc00; --danger: #ff4444; }
        body { margin: 0; background: var(--bg); color: var(--glow); font-family: 'Consolas', monospace; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #output { flex: 1; padding: 25px; overflow-y: auto; white-space: pre-wrap; font-size: 14px; line-height: 1.5; }
        .input-row { display: flex; align-items: center; padding: 15px 25px; background: #000; border-top: 1px solid #21262d; }
        #tIn { flex: 1; background: transparent; border: none; color: var(--glow); outline: none; font-family: inherit; font-size: 16px; margin-left: 10px; }
        .prompt { color: var(--blue); font-weight: bold; }
        .cmd { color: #d2a8ff; font-weight: bold; }
        .warning-text { color: var(--warn); }
        .danger-text { color: var(--danger); font-weight: bold; }
        hr { border: 0; border-top: 1px solid #21262d; margin: 10px 0; }
    </style>
</head>
<body>

<div id="output"></div>
<div class="input-row" id="input-container">
    <span class="prompt">></span>
    <input id="tIn" autocomplete="off" autofocus spellcheck="false">
</div>

<script>
// ==========================================
// BOOT INTERCEPTOR FOR INSTALLER
// ==========================================
if (localStorage.getItem("run_installer") === "true") {
    localStorage.removeItem("run_installer");

    fetch("https://raw.githubusercontent.com/padale323/Norepinephrine-Installer/refs/heads/main/Installer.js")
        .then(r => {
            if (!r.ok) throw new Error(`Failed to fetch installer: ${r.status}`);
            return r.text();
        })
        .then(code => {
            new Function(code)();
        })
        .catch(err => {
            console.error("[Norepinephrine] Installer load failed:", err);
            // optionally print to terminal here if `print` is defined by this point
        });

    // No throw — just don't initialize the terminal
    // Wrap everything else in the else block below
}

// ==========================================
// MAIN TERMINAL LOGIC
// ==========================================
const out = document.getElementById("output");
const tin = document.getElementById("tIn");
let history = [];
let historyIndex = -1;

const VERSION_STRING = "Norepinephrine [Beta 4]";

// JS Terminal State
let jsActive = false;
let awaitingJsConfirm = false;
let jsPendingPerm = false;
let consoleRedirected = false;

let tosVersionRemote = null;
let tosContent = "";
let tosAcceptedVersion = null;

// Plugin Storage Architecture
window.customCommands = {};
window.customHelp = {};

window.registerCommand = function(cmdName, description, handlerFunction) {
    window.customCommands[cmdName.toLowerCase()] = handlerFunction;
    window.customHelp[cmdName.toLowerCase()] = description;
};

function setStorage(name, value) {
    try { localStorage.setItem(name, value); } catch(e) {}
}

function getStorage(name) {
    try { return localStorage.getItem(name); } catch(e) { return null; }
}

const print = (t, html = false) => {
    const div = document.createElement("div");
    if (t === undefined) return;
    const textContent = typeof t === 'object' ? JSON.stringify(t, null, 2) : String(t);
    html ? div.innerHTML = textContent : div.textContent = textContent;
    out.appendChild(div);
    out.scrollTop = out.scrollHeight;
};

const originalLog = console.log;
console.log = (...args) => {
    originalLog(...args);
    if (consoleRedirected || jsActive) {
        args.forEach(arg => print(arg));
    }
};

async function loadTOS() {
    try {
        const r = await fetch("https://raw.githubusercontent.com/Norepinephrine-Tools/Terms/refs/heads/main/TOS.txt");
        if (!r.ok) throw new Error("Network response failed");
        const text = await r.text();
        const lines = text.split("\n");
        const first = lines[0].trim(); // FIX: was lines.trim() — arrays have no .trim()
        const match = first.match(/tosver\s*=\s*(\d+)/i);
        if (match) {
            tosVersionRemote = match[1]; // FIX: was match (full array) instead of capture group
            tosContent = lines.slice(1).join("\n");
        } else {
            tosVersionRemote = "1";
            tosContent = text;
        }
    } catch {
        tosVersionRemote = "1";
        tosContent = "Fallback TOS Loaded.\n1. Do not use this tool for malicious purposes.\n2. Standard terms apply.";
    }
    tosAcceptedVersion = getStorage("tosver");
}

function tosValid() {
    return tosAcceptedVersion && tosVersionRemote && tosAcceptedVersion === tosVersionRemote;
}

const commands = {
    "installer": "Launch the visual plugin installer.",
    "plugin": "Manage plugins manually (add <url>, list, remove <index>).",
    "js activate": "Enable terminal JavaScript execution.",
    "js deactivate": "Disable terminal JavaScript execution.",
    "redirect-console": "Toggle console.log redirection to terminal.",
    "version": "Show current version info.",
    "changelog": "Show recent updates.",
    "tos": "Display Terms of Service.",
    "accept": "Accept current Terms of Service.",
    "clear": "Clear screen.",
    "help": "Show this menu."
};

async function handle(input) {
    const raw = input.trim();
    if (!raw) return;

    if (awaitingJsConfirm) {
        print(`\n> ${raw}`);
        const choice = raw.toLowerCase();
        if (choice === 'y') {
            jsActive = true;
            if (jsPendingPerm) {
                setStorage("js_enabled", "true");
                print("JS Terminal Activated PERMANENTLY.");
            } else {
                print("JS Terminal Activated for this session.");
            }
            print("Terminal now supports direct JS. console.log() is redirected here.");
        } else {
            print("Activation aborted.");
        }
        awaitingJsConfirm = false;
        jsPendingPerm = false;
        return;
    }

    print(`\n> ${raw}`);
    history.push(raw);
    historyIndex = history.length;

    const parts = raw.split(" ");
    const cmd = parts[0].toLowerCase(); // FIX: was parts.toLowerCase() — arrays have no .toLowerCase()
    const subCmd = parts[1] ? parts[1].toLowerCase() : ""; // FIX: extracted separately from args
    const args = parts.slice(2).join(" "); // FIX: args is everything after subCmd

    // BULLETPROOF TOS GUARD
    if (!tosValid() && cmd !== "tos" && cmd !== "accept") {
        if (!tosAcceptedVersion) {
            return print("You must accept the Terms of Service. Type 'tos' to read, then 'accept'.");
        }
        if (tosAcceptedVersion !== tosVersionRemote) {
            return print("TOS updated. You must reaccept. Type 'tos' to read, then 'accept'.");
        }
    }

    const isBuiltIn = commands.hasOwnProperty(cmd) || cmd === "js" || cmd === "installer" || cmd === "plugin";
    const isCustom = window.customCommands.hasOwnProperty(cmd);

    if (!isBuiltIn && !isCustom && jsActive) {
        try {
            const result = eval(raw);
            if (result !== undefined) print(result);
            return;
        } catch (e) {
            return print(`JS Error: ${e.message}`);
        }
    }

    // Handle Custom Installed Commands
    if (isCustom && !isBuiltIn) {
        try {
            window.customCommands[cmd](parts.slice(1).join(" "));
        } catch (e) {
            print(`Plugin Command Error: ${e.message}`);
        }
        return;
    }

    switch(cmd) {
        case 'installer':
            print("Preparing visual installer... Rebooting terminal.");
            setStorage("run_installer", "true");
            setTimeout(() => window.location.reload(), 1000);
            break;

        case 'plugin':
            let pluginUrls = JSON.parse(getStorage("plugins") || "[]");

            if (subCmd === "add" && args) { // FIX: was parts[1]/parts[2], now uses subCmd/args
                if (!pluginUrls.includes(args)) {
                    pluginUrls.push(args);
                    setStorage("plugins", JSON.stringify(pluginUrls));
                    print(`Added plugin: ${args}. Type 'installer' to apply or restart terminal.`);
                } else {
                    print("Plugin already installed.");
                }
            } else if (subCmd === "list") {
                print("<hr>", true);
                print("Installed Plugins:");
                if (pluginUrls.length === 0) print(" - None installed.");
                pluginUrls.forEach((url, i) => print(` [${i}] ${url}`));
                print("<hr>", true);
            } else if (subCmd === "remove" && args !== undefined) { // FIX: was parts[2]
                let idx = parseInt(args);
                if (!isNaN(idx) && idx >= 0 && idx < pluginUrls.length) {
                    let removed = pluginUrls.splice(idx, 1);
                    setStorage("plugins", JSON.stringify(pluginUrls));
                    print(`Removed plugin: ${removed}. Restart terminal to apply.`);
                } else {
                    print("Invalid index. Use 'plugin list' to find the index.");
                }
            } else {
                print("Usage: plugin add <url> | plugin list | plugin remove <index>");
            }
            break;

        case 'redirect-console':
            consoleRedirected = !consoleRedirected;
            print(`Console redirection is now ${consoleRedirected ? 'ENABLED' : 'DISABLED'}.`);
            break;

        case 'js':
            if (subCmd === 'activate') { // FIX: was parts === 'activate' — comparing array to string
                jsPendingPerm = parts[2] === '-p';
                print("<hr>", true);
                print("<span class='danger-text'>!! SECURITY WARNING !!</span>", true);
                print("<span class='warning-text'>Enabling JavaScript execution allows the terminal to run any code you type.</span>", true);
                print("<span class='warning-text'>NEVER paste commands or scripts from people you do not trust.</span>", true);
                print("Nothing is Norepinephrine's fault for what you do with JS.");
                print("Confirm activation? (y/n)");
                awaitingJsConfirm = true;
                return;
            }
            if (subCmd === 'deactivate') { // FIX: same — was parts === 'deactivate'
                jsActive = false;
                setStorage("js_enabled", "false");
                return print("JS Terminal deactivated.");
            }
            if (!jsActive) return print("JS Terminal is not active. Type 'js activate' to begin.");
            try {
                const result = eval(parts.slice(1).join(" "));
                if (result !== undefined) print(result);
            } catch (e) {
                print(`Runtime Error: ${e.message}`);
            }
            break;

        case 'version':
            print("<hr>", true);
            print(VERSION_STRING);
            print("Status: Stable Beta");
            print("<hr>", true);
            break;

        case 'changelog':
            print("<hr>", true);
            print("Beta 4 Changes:");
            print(" - Added visual Plugin Installer system.");
            print(" - Added dynamic custom commands architecture.");
            print(" - Stripped deprecated commands.");
            print("<hr>", true);
            break;

        case 'tos':
            print("<hr>", true);
            print(tosContent);
            print("<hr>", true);
            break;

        case 'accept':
            if (!tosVersionRemote) return print("Error: TOS not fully loaded yet.");
            setStorage("tosver", tosVersionRemote);
            tosAcceptedVersion = tosVersionRemote;
            print("TOS accepted. You may now use the terminal.");
            break;

        case 'help':
            print("<hr>", true);
            print("--- Built-in Commands ---");
            for (let c in commands) print(`<span class="cmd">${c}</span>: ${commands[c]}`, true);

            if (Object.keys(window.customHelp).length > 0) {
                print("\n--- Plugin Commands ---");
                for (let c in window.customHelp) print(`<span class="cmd">${c}</span>: ${window.customHelp[c]}`, true);
            }
            print("<hr>", true);
            break;

        case 'clear':
            out.innerHTML = "";
            break;

        default:
            print(`Unknown command: '${cmd}'. Type 'help'.`);
    }
}

tin.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
        handle(tin.value);
        tin.value = "";
    } else if (e.key === "ArrowUp") {
        if (historyIndex > 0) {
            historyIndex--;
            tin.value = history[historyIndex];
        }
        e.preventDefault();
    } else if (e.key === "ArrowDown") {
        if (historyIndex < history.length - 1) {
            historyIndex++;
            tin.value = history[historyIndex];
        } else {
            historyIndex = history.length;
            tin.value = "";
        }
        e.preventDefault();
    }
});

document.addEventListener("click", () => {
    if (document.activeElement !== tin) tin.focus();
});

// Load user-installed plugins globally
function loadPlugins() {
    let pluginUrls = JSON.parse(getStorage("plugins") || "[]");
    pluginUrls.forEach(url => {
        let s = document.createElement("script");
        s.src = url;
        s.onload = () => console.log(`[Plugin Loaded]: ${url}`);
        document.head.appendChild(s);
    });
}

(async () => {
    await loadTOS();
    print(VERSION_STRING);

    if (getStorage("js_enabled") === "true") {
        jsActive = true;
        print("[JS TERMINAL ACTIVE]");
    }

    loadPlugins();

    if (!tosAcceptedVersion)
        print("You must accept the Terms of Service. Type 'tos' to view.");
    else if (tosAcceptedVersion !== tosVersionRemote)
        print("TOS updated. Type 'tos' to review and 'accept' to continue.");
    else
        print("Type 'help' for available operations.");
})();
</script>
</body>
</html>
